<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Verso — Table Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Spectral:ital,wght@0,300;0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --felt-950:#0A0F0C;
  --felt-900:#0E1411;
  --felt-800:#142019;
  --baize:#1B2D23;
  --baize-line:#27402F;
  --brass:#C8A14E;
  --brass-dim:#8A6E36;
  --brass-faint:#5A4A28;
  --vellum:#E9E2CE;
  --vellum-dim:#ABA38C;
  --oxblood:#8A2E25;
  --under:#7FA8B8;
  --ink:#070908;
  --panel-w:312px;
  --rail-w:54px;
  --top-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--felt-950);color:var(--vellum);
  font-family:'Spectral',Georgia,serif;font-size:15px}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--vellum);
  background:var(--felt-900);border:1px solid var(--brass-faint);border-radius:3px;padding:5px 7px;outline:none}
input:focus,select:focus{border-color:var(--brass)}
::selection{background:var(--brass);color:var(--ink)}

/* ---------- top bar ---------- */
#topbar{position:fixed;inset:0 0 auto 0;height:var(--top-h);display:flex;align-items:center;gap:14px;
  padding:0 14px;background:linear-gradient(180deg,var(--felt-800),var(--felt-900));
  border-bottom:1px solid var(--brass-faint);z-index:30}
#wordmark{font-family:'Marcellus',serif;font-size:19px;letter-spacing:.14em;color:var(--brass);white-space:nowrap}
#wordmark small{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.22em;color:var(--vellum-dim);
  display:block;margin-top:-2px}
.tabs{display:flex;gap:2px;margin-left:6px}
.tab{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px 13px;
  color:var(--vellum-dim);border:1px solid transparent;border-radius:3px}
.tab:hover{color:var(--vellum)}
.tab.on{color:var(--brass);border-color:var(--brass-faint);background:var(--felt-950)}
#topbar .spacer{flex:1}
.viewswitch{display:flex;border:1px solid var(--brass-faint);border-radius:3px;overflow:hidden}
.viewswitch button{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px 12px;color:var(--vellum-dim)}
.viewswitch button.on{background:var(--brass);color:var(--ink)}
.tbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px 12px;
  border:1px solid var(--brass-faint);border-radius:3px;color:var(--vellum-dim)}
.tbtn:hover{color:var(--brass);border-color:var(--brass-dim)}

/* ---------- tool rail ---------- */
#rail{position:fixed;left:0;top:var(--top-h);bottom:26px;width:var(--rail-w);z-index:20;
  display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:12px;
  background:var(--felt-900);border-right:1px solid var(--brass-faint)}
.tool{width:38px;height:38px;border-radius:4px;display:grid;place-items:center;color:var(--vellum-dim);
  border:1px solid transparent}
.tool svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.tool:hover{color:var(--vellum)}
.tool.on{color:var(--brass);border-color:var(--brass-dim);background:var(--felt-950)}
.tool[disabled]{opacity:.25;pointer-events:none}
.rail-rule{width:26px;height:1px;background:var(--brass-faint);margin:5px 0}
.tool .kbd{position:absolute;display:none}

/* ---------- canvas ---------- */
#stage{position:fixed;left:var(--rail-w);right:var(--panel-w);top:var(--top-h);bottom:26px;background:var(--felt-950)}
#cv{width:100%;height:100%;display:block;touch-action:none;cursor:grab}
#cv.tool-fogr,#cv.tool-fogh{cursor:crosshair}
#cv.tool-ruler{cursor:crosshair}
#dropzone{position:absolute;inset:0;display:none;place-items:center;background:rgba(14,20,17,.85);
  border:2px dashed var(--brass-dim);z-index:5;pointer-events:none;
  font-family:'Marcellus',serif;font-size:20px;letter-spacing:.1em;color:var(--brass)}
#stage.dragging #dropzone{display:grid}

/* ---------- right panel ---------- */
#panel{position:fixed;right:0;top:var(--top-h);bottom:26px;width:var(--panel-w);z-index:20;overflow-y:auto;
  background:var(--felt-900);border-left:1px solid var(--brass-faint);padding:14px 14px 28px;
  scrollbar-width:thin;scrollbar-color:var(--brass-faint) transparent}
.sect{margin-bottom:20px}
.sect h3{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.24em;
  color:var(--brass-dim);text-transform:uppercase;margin-bottom:9px;
  display:flex;align-items:center;gap:8px}
.sect h3::after{content:"";flex:1;height:1px;background:var(--brass-faint)}
.hint{font-size:13px;line-height:1.55;color:var(--vellum-dim);font-style:italic}
.row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.row label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--vellum-dim);width:64px;flex:none}
.row input[type=range]{flex:1;accent-color:var(--brass)}
.row input[type=number]{width:64px}
.row input[type=text]{flex:1}
.check{display:flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:var(--vellum-dim);cursor:pointer;margin-bottom:8px}
.check input{accent-color:var(--brass)}

/* room card */
#roomcard{border:1px solid var(--brass-dim);border-radius:4px;background:var(--felt-950);overflow:hidden}
#roomcard .rc-head{padding:10px 12px;background:linear-gradient(180deg,var(--felt-800),var(--felt-950));
  border-bottom:1px solid var(--brass-faint)}
#roomcard .rc-name{font-family:'Marcellus',serif;font-size:17px;color:var(--brass);letter-spacing:.05em}
#roomcard .rc-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--vellum-dim);margin-top:2px}
#roomcard .rc-body{padding:11px 12px}
#roomcard .rc-read{font-size:13.5px;line-height:1.6;color:var(--vellum)}
#roomcard .rc-dm{margin-top:10px;padding:9px 10px;border-left:2px solid var(--oxblood);background:rgba(138,46,37,.07);
  font-size:13px;line-height:1.55;color:var(--vellum-dim)}
#roomcard .rc-dm b{color:var(--vellum);font-weight:600}
#roomcard .rc-clues{margin-top:10px}
#roomcard .rc-clues div{font-size:12.5px;line-height:1.5;color:var(--under);padding:3px 0 3px 16px;position:relative}
#roomcard .rc-clues div::before{content:"◈";position:absolute;left:0;color:var(--brass-dim);font-size:10px;top:6px}
#roomcard .rc-foot{padding:9px 12px;border-top:1px solid var(--brass-faint);display:flex;gap:8px}
.rbtn{flex:1;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px;
  border:1px solid var(--brass-dim);border-radius:3px;color:var(--brass)}
.rbtn:hover{background:var(--brass);color:var(--ink)}
.rbtn.quiet{border-color:var(--brass-faint);color:var(--vellum-dim)}

/* tokens */
.toklist{display:flex;flex-direction:column;gap:4px}
.tok{display:flex;align-items:center;gap:9px;padding:6px 8px;border:1px solid transparent;border-radius:3px;cursor:pointer}
.tok:hover{border-color:var(--brass-faint);background:var(--felt-950)}
.tok.sel{border-color:var(--brass-dim);background:var(--felt-950)}
.tok .dot{width:15px;height:15px;border-radius:50%;flex:none;border:1.5px solid rgba(233,226,206,.55);
  display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;color:var(--ink)}
.tok .nm{flex:1;font-size:13px;color:var(--vellum);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tok .del{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--vellum-dim);padding:2px 5px;border-radius:3px}
.tok .del:hover{color:var(--oxblood);background:rgba(138,46,37,.15)}
.swatches{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.sw{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.sw.on{border-color:var(--vellum)}
#addtok-btn{width:100%}

/* status bar */
#status{position:fixed;left:0;right:0;bottom:0;height:26px;display:flex;align-items:center;gap:18px;
  padding:0 12px;background:var(--felt-900);border-top:1px solid var(--brass-faint);z-index:30;
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--vellum-dim)}
#status .spacer{flex:1}
#st-view{color:var(--brass)}

/* player-view masking */
body.playerview #roomcard .rc-dm,body.playerview #roomcard .rc-clues,
body.playerview .dm-only{display:none!important}

@media (prefers-reduced-motion: reduce){ :root{--shimmer:0} }
#net-banner{position:fixed;top:70px;left:50%;transform:translateX(-50%) scale(.8);opacity:0;pointer-events:none;
  text-align:center;transition:opacity .25s,transform .25s;z-index:40;text-shadow:0 2px 14px rgba(0,0,0,.9)}
#net-banner.show{opacity:1;transform:translateX(-50%) scale(1)}
#net-banner .rb-head{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.22em;color:var(--vellum-dim)}
#net-banner .rb-total{font-family:Marcellus,serif;font-size:72px;line-height:1;color:var(--vellum)}
#net-banner .rb-detail{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--under)}
body.netclient #rail,body.netclient .tabs,body.netclient .viewswitch,
body.netclient #btn-save,body.netclient #btn-load,body.netclient #btn-host,body.netclient #btn-pwin{display:none!important}
#dmgate{position:fixed;inset:0;z-index:100;display:grid;place-items:center;background:#0A0F0C}
#dmgate .gcard{text-align:center;padding:36px 44px;border:1px solid var(--brass-faint);border-radius:6px;background:var(--felt-900)}
#dmgate h1{font-family:Marcellus,serif;font-size:26px;letter-spacing:.14em;color:var(--brass);margin-bottom:4px}
#dmgate .gsub{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.24em;color:var(--vellum-dim);margin-bottom:22px}
#dmgate input{width:220px;text-align:center;font-size:14px;padding:9px}
#dmgate .gbtn{display:block;margin:12px auto 0;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;
  padding:8px 22px;border:1px solid var(--brass-dim);border-radius:3px;color:var(--brass);cursor:pointer}
#dmgate .gbtn:hover{background:var(--brass);color:var(--ink)}
#dmgate .gerr{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--oxblood);height:14px;margin-top:10px}
#dmgate.shake .gcard{animation:gshake .3s}
@keyframes gshake{25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
</style>
</head>
<body>

<div id="dmgate">
  <div class="gcard">
    <h1>THE VERSO</h1>
    <div class="gsub">DM CONSOLE · THE HOUSE REQUIRES A WORD</div>
    <input type="password" id="dmpass" placeholder="passphrase" autocomplete="off">
    <button class="gbtn" id="dmgo">ENTER</button>
    <div class="gerr" id="dmerr"></div>
  </div>
</div>
<header id="topbar">
  <div id="wordmark">THE VERSO<small>TABLE CONSOLE · THE PALIMPSEST</small></div>
  <nav class="tabs">
    <button class="tab" id="tab-map">YOUR MAP</button>
    <button class="tab on" id="tab-verso">THE VERSO · BACK OF HOUSE</button>
  </nav>
  <div class="spacer"></div>
  <div class="viewswitch" title="Player view hides DM notes, fog contents and unrevealed rooms">
    <button id="vw-dm" class="on">DM</button><button id="vw-pl">PLAYER</button>
  </div>
  <span id="net-status" style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--under);cursor:pointer;display:none" title="click to copy invite link"></span>
  <button class="tbtn" id="btn-host" title="Host an online table — players join with a code from their own devices">HOST TABLE</button>
  <button class="tbtn" id="btn-pwin" title="Open a separate live player-view window — share THAT window, keep this one private">PLAYER WINDOW ↗</button>
  <button class="tbtn" id="btn-save">SAVE</button>
  <button class="tbtn" id="btn-load">LOAD</button>
</header>

<aside id="rail">
  <button class="tool on" id="t-select" title="Select / move tokens · pan empty space  (V)">
    <svg viewBox="0 0 24 24"><path d="M6 3l12 9-5.5 1.2L10 19z"/></svg></button>
  <button class="tool" id="t-ruler" title="Ruler — drag to measure  (M)">
    <svg viewBox="0 0 24 24"><path d="M3 17L17 3l4 4L7 21zM8 16l1.5 1.5M11 13l1.5 1.5M14 10l1.5 1.5M17 7l1.5 1.5"/></svg></button>
  <div class="rail-rule"></div>
  <button class="tool" id="t-fogr" title="Reveal fog (uploaded map only)  (R)">
    <svg viewBox="0 0 24 24"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="2.6"/></svg></button>
  <button class="tool" id="t-fogh" title="Hide with fog (uploaded map only)  (H)">
    <svg viewBox="0 0 24 24"><path d="M4 4l16 16M2 12s3.5-6 10-6c1.6 0 3 .35 4.3.9M22 12s-3.5 6-10 6c-1.6 0-3-.35-4.3-.9"/></svg></button>
  <div class="rail-rule"></div>
  <button class="tool" id="t-fit" title="Fit scene to screen  (F)">
    <svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
</aside>

<main id="stage">
  <canvas id="cv"></canvas>
  <div id="dropzone">DROP MAP IMAGE</div>
</main>

<aside id="panel"></aside>

<div id="net-banner"></div>
<footer id="status">
  <span id="st-view">DM VIEW</span>
  <span id="st-hint">Drag tokens · drag space to pan · wheel to zoom</span>
  <span class="spacer"></span>
  <span id="st-pos"></span>
  <span id="st-zoom"></span>
</footer>

<input type="file" id="file-img" accept="image/*" hidden>
<input type="file" id="file-json" accept="application/json" hidden>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<script>
"use strict";
/* =====================================================================
   THE VERSO — single-file table console
   Scenes: "map" (uploaded image, square grid, fog of war)
           "verso" (built-in isometric Back of House)
   ===================================================================== */

const $ = id => document.getElementById(id);
const cv = $("cv");
let ctx = cv.getContext("2d");
let RVIEW = "dm";      // view used by the current render pass ("dm" | "pl")
let CAMOVR = null;     // camera override for the player-window render pass
const REDUCED = matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---------------- iso constants ---------------- */
const TW = 72, TH = 36;                 // iso tile screen size at zoom 1
const isoX = (i,j)=> (i-j)*TW/2;
const isoY = (i,j)=> (i+j)*TH/2;
const unIso = (x,y)=> [ (x/(TW/2)+y/(TH/2))/2, (y/(TH/2)-x/(TW/2))/2 ];

/* ---------------- the Verso floor plan ---------------- */
/* rect = tile coords {x,y,w,h}; corners run x..x+w, y..y+h */
const ROOMS = [
 {id:"lift", name:"Freight Landing", sub:"scene of the crime",
  rect:{x:6,y:0,w:3,h:3}, floorA:"#3E424A", floorB:"#363A42", wall:"#5A5E66",
  read:"The freight doors hang wrenched off their track, one panel folded like a playing card. The lectern still stands beside them, its book open to pages that are now simply blank. The muzak plays on, unbothered. Somewhere down the corridor: footsteps on carpet. One set. Taking their time.",
  dm:"<b>ACT 1 RUNS HERE.</b> The Concierge arrives alone, notes the damage in a small pad, and delivers the bill speech: the account is matured; the lift goes DOWN or OUT freely, UP only after settlement; three ways to settle — <b>pay, win, or work</b> — at the Cage. He cannot lie about terms; anything else is 'above my floor, sir.' Key rule, stated in his voice when tested: <b>'Your magic can slam any door in this house. It can't unwrite a line. Effects, not records.'</b> One minute after he leaves, the patrols start (see Service Corridor).",
  clues:["The car panel now reads only: DOWN · OUT. The UP line is dark, labeled SETTLEMENT REQUIRED.",
         "The register is blank — their dispel erased it. The floor now reads the party as intruders, not guests.",
         "The TRANSIT tray fits the silver disc. Below it, much older: a slot shaped for a folded paper. A writ."]},
 {id:"white", name:"The White Room", sub:"where the elevator let him out",
  rect:{x:2,y:2,w:4,h:4}, floorA:"#D8D2C2", floorB:"#CCC5B2", wall:"#9C947E",
  read:"A room the color of nothing. No seams, no fixtures, no door — not on this side. Somewhere far off, a slot machine pays out; it sounds like applause.",
  dm:"<b>The door exists only when the house wants one.</b> It appears in whichever wall the Concierge is about to enter through. Trajan answers questions one beat too late, like a call on a bad line. If pressed (DC 13 Insight), his eyes flick toward the cloakroom wall before anyone knows the cloakroom exists.",
  clues:["Trajan's bootprints come IN through a solid wall. There are no prints of Randy's arrival at all.",
         "Trajan hums the muzak from the corridor — a song he hasn't heard yet.",
         "Scratched at floor level, very old, in Randy's handwriting: a tally of days. It stops at 9."]},
 {id:"cloak", name:"Cloakroom", sub:"unattended · ring bell for service",
  rect:{x:2,y:6,w:3,h:3}, floorA:"#33272A", floorB:"#2B2125", wall:"#5A4A40",
  read:"Rails of coats recede further than the room should allow. Every coat is dry. A brass bell sits on the counter beside a single claim ticket, face down.",
  dm:"<b>One coat is Randy's.</b> He never owned it — but it fits perfectly and smells like a campfire he can't place. The face-down ticket is stub #0001, decades old, in Randy's handwriting — <b>and it is a valid claim ticket at Lost &amp; Found.</b> Ringing the bell summons the Concierge in 1d4 rounds, polite and unhurried.",
  clues:["The claim ticket's date is older than Randy believes himself to be.",
         "In one coat pocket: a casino chip stamped MEISNER. The denomination is a word, smudged beyond reading.",
         "The coat-check log's line for Trajan reads only: TRAJAN — see ACQUISITIONS."]},
 {id:"corrH", name:"Service Corridor", sub:"staff only · mind the carpet",
  rect:{x:6,y:3,w:18,h:2}, floorA:"#5A2723", floorB:"#4D211E", wall:"#3A2E22", corridor:true,
  read:"Oxblood carpet, brass mirror-plates, muzak that is almost a song everyone at the table knows. The pattern in the carpet repeats — then repeats wrong, like a word said too many times.",
  dm:"<b>THE PATROL ENGINE.</b> 3 patrols of 2 Empty Suits (Animated Armor: AC 18, HP 33, +4, two slams 1d6+2; Press: a hit may grapple instead, escape DC 13). They ESCORT, not execute — violence only if the party swings first or breaks a grapple 3 times. One suit per patrol carries a whistle: nearest patrol arrives in 3 rounds. Circuits — A: this corridor loop; B: Lower Corridor; C: Lost &amp; Found / Cloakroom. <b>The pulse:</b> advance all patrols one leg whenever the party finishes a room activity or fails a check loudly. Moving between rooms: group Stealth vs passive 13. <b>The Cage is sanctuary</b> — suits stop at its threshold. Dispel or shatter staggers a suit 1 round (effects, not records — reward the verb). <b>Klaus's light:</b> makes under-writing legible in its radius (grant a clue of your choice); tally each use — at 5 total, the muzak stops for six seconds. Count them aloud. Say nothing else.",
  clues:["The under-writing shows in the mirror-plates, never on the walls (Investigation DC 12).",
         "The muzak resolves, for four bars, into a lullaby Randy's player gets to invent on the spot.",
         "Staff pass without footsteps. Their shadows arrive a half-second late."]},
 {id:"corrV", name:"Lower Corridor", sub:"the carpet is older here",
  rect:{x:14,y:5,w:2,h:12}, floorA:"#4D211E", floorB:"#411C1A", wall:"#3A2E22", corridor:true, bleed:[[14,13],[15,14],[14,15],[15,16],[14,16]],
  read:"The corridor slopes, though no stair was taken. The carpet thins. In patches it has worn through entirely — and beneath it is not floorboard but cold, dressed stone, much older than the building above.",
  dm:"<b>This is where the casino's skin fails.</b> The stone is the scriptio inferior — the original text the house was written over. The bare patches are warm, faintly, like skin. Patrol B walks this stretch. Sound carries strangely: whispers from the Cage arrive before they are spoken.",
  clues:["The wallpaper peels at the seam. Under it: the same stone, carved with writing that rearranges when watched.",
         "A service cart sits abandoned mid-corridor, drinks still cold. The order slip reads: R. MEISNER — THE USUAL.",
         "The bleed-through patches are larger than they were an hour ago."]},
 {id:"lost", name:"Lost & Found", sub:"unclaimed effects · claims honored",
  rect:{x:7,y:5,w:6,h:5}, floorA:"#21392B", floorB:"#1B3024", wall:"#2E4A38",
  read:"Bins and pigeonholes of objects nobody came back for: reading glasses, a wedding ring, a child's shoe, a violin with one string. Every object is labeled in the same tidy hand — not with names, but with prices. 'A brother's face.' 'The way home.' 'Three good years.'",
  dm:"<b>THE CLAIM SYSTEM.</b> Numbered bins; tickets match bins; stub #0001 (Cloakroom) is valid. Retrieval WITH a ticket: free, no consequence. WITHOUT: the item crossing the threshold marks the thief (no save — a faint smell of ink that won't wash off) and Patrol C diverts here in 3 rounds → <b>4 Empty Suits</b> (patrol + whistle). They accept surrender of the item plus a late fee (one Trifle memory) at any point — but this table may just want the fight. Winning it adds a DAMAGES line the party can go watch appear in Accounts. <b>The MEISNER bin is empty</b> — transfer slip inside (see clues). <b>The Cure ticket</b> (David's hook): the Concierge quotes terms for release to a non-claimant — 'a memory of the person you would spend it on' — or it can be folded into the Cage bundle instead.",
  clues:["Transfer slip in the empty bin: 'Contents relocated to VAULT per Article of Protection, upon maturity. Claimant must present in person. Level 2.'",
         "In a bin of unclaimed claims: a ticket for ONE (1) CURE — remedy, complete. Claimant name smudged.",
         "The grandfather clock against the east wall is stopped at 3:17. So is every other timepiece down here."]},
 {id:"acct", name:"Accounts", sub:"ledgers · liens · maturities",
  rect:{x:17,y:5,w:6,h:5}, floorA:"#C9BD9C", floorB:"#BFB28F", wall:"#8F8468",
  read:"Vellum everywhere. Sloped desks, entries writing themselves in unhurried brown ink. Floor-to-ceiling shelves of bound account books, thousands of them. As you watch, one book quietly slides itself two slots lower on its shelf — like something just got heavier.",

/* ---------------- canvas sizing ---------------- */
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(devicePixelRatio||1,2);
  const r = $("stage").getBoundingClientRect();
  W=r.width; H=r.height;
  cv.width=W*DPR; cv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener("resize",()=>{resize();});

/* ---------------- camera helpers ---------------- */
const toScreen=(wx,wy)=>{const c=cam();return [(wx-c.x)*c.s,(wy-c.y)*c.s];};
const toWorld =(sx,sy)=>{const c=cam();return [sx/c.s+c.x, sy/c.s+c.y];};
function zoomAt(sx,sy,f){
  const c=cam(); const [wx,wy]=toWorld(sx,sy);
  c.s=Math.min(6,Math.max(.12,c.s*f));
  c.x=wx-sx/c.s; c.y=wy-sy/c.s;
}
function fitScene(){
  const c=cam();
  if(state.scene==="map"){
    if(!state.map.img){c.x=-W/2;c.y=-H/2;c.s=1;return;}
    const iw=state.map.img.width, ih=state.map.img.height;
    c.s=Math.min(W/iw,H/ih)*.94;
    c.x=-(W/c.s-iw)/2; c.y=-(H/c.s-ih)/2;
  }else{
    let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
    for(const r of ROOMS){
      const cs=[[r.rect.x,r.rect.y],[r.rect.x+r.rect.w,r.rect.y],[r.rect.x+r.rect.w,r.rect.y+r.rect.h],[r.rect.x,r.rect.y+r.rect.h]];
      for(const [i,j] of cs){minX=Math.min(minX,isoX(i,j));maxX=Math.max(maxX,isoX(i,j));minY=Math.min(minY,isoY(i,j));maxY=Math.max(maxY,isoY(i,j));}
    }
    const bw=maxX-minX, bh=maxY-minY+70;
    c.s=Math.min(W/bw,H/bh)*.9;
    c.x=minX-(W/c.s-bw)/2; c.y=minY-44-(H/c.s-bh)/2;
  }
}

/* ---------------- drawing: map scene ---------------- */
function drawMap(){
  const m=state.map, c=cam();
  ctx.save();
  ctx.scale(c.s,c.s); ctx.translate(-c.x,-c.y);
  if(m.img){
    ctx.drawImage(m.img,0,0);
    if(m.grid.show){
      ctx.strokeStyle="rgba(200,161,78,.22)";
      ctx.lineWidth=1/c.s;
      ctx.beginPath();
      const g=m.grid.size;
      for(let x=m.grid.ox%g; x<=m.img.width; x+=g){ctx.moveTo(x,0);ctx.lineTo(x,m.img.height);}
      for(let y=m.grid.oy%g; y<=m.img.height; y+=g){ctx.moveTo(0,y);ctx.lineTo(m.img.width,y);}
      ctx.stroke();
    }
    // tokens
    for(const t of m.tokens) drawTokenFlat(t,m.grid.size,c.s);
    // fog
    if(m.fog && m.fogOn){
      ctx.globalAlpha = RVIEW==="dm" ? .45 : 1;
      ctx.drawImage(m.fog,0,0);
      ctx.globalAlpha = 1;
    }
  }else{
    ctx.restore();
    emptyMapMessage();
    return;
  }
  ctx.restore();
}
function emptyMapMessage(){
  ctx.fillStyle="#0E1411"; ctx.fillRect(0,0,W,H);
  ctx.textAlign="center";
  ctx.fillStyle="#C8A14E"; ctx.font="22px Marcellus, serif";
  if(RVIEW==="pl"){
    ctx.fillText("THE TABLE IS BEING SET",W/2,H/2);
    return;
  }
  ctx.fillText("NO MAP ON THE TABLE",W/2,H/2-16);
  ctx.fillStyle="#ABA38C"; ctx.font="12px 'IBM Plex Mono', monospace";
  ctx.fillText("drop an image anywhere, or use IMPORT MAP in the panel →",W/2,H/2+12);
}
function drawTokenFlat(t,g,s){
  const r=g*.42*t.size;
  ctx.save();
  ctx.shadowColor="rgba(0,0,0,.55)"; ctx.shadowBlur=10/s; ctx.shadowOffsetY=3/s;
  ctx.beginPath(); ctx.arc(t.x,t.y,r,0,7); ctx.fillStyle=t.color; ctx.fill();
  ctx.shadowColor="transparent";
  ctx.lineWidth=Math.max(2,g*.05);
  ctx.strokeStyle = (RVIEW==="dm"&&state.selToken===t.id) ? "#E9E2CE" : "rgba(7,9,8,.6)";
  ctx.stroke();
  ctx.fillStyle="#070908"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.font=`600 ${r*.8}px 'IBM Plex Mono', monospace`;
  ctx.fillText(t.letter,t.x,t.y+r*.04);
  ctx.font=`500 ${Math.max(10,g*.2)}px 'IBM Plex Mono', monospace`;
  ctx.fillStyle="#E9E2CE";
  ctx.strokeStyle="rgba(7,9,8,.8)"; ctx.lineWidth=3; ctx.lineJoin="round";
  ctx.strokeText(t.name,t.x,t.y+r+g*.18);
  ctx.fillText(t.name,t.x,t.y+r+g*.18);
  ctx.restore();
}

/* ---------------- drawing: verso iso scene ---------------- */
let tNow=0;
function hash2(i,j){let h=(i*374761393+j*668265263)|0;h=(h^(h>>13))*1274126177;return ((h^(h>>16))>>>0)/4294967295;}
function tilePath(i,j){
  ctx.beginPath();
  ctx.moveTo(isoX(i,j),       isoY(i,j));
  ctx.lineTo(isoX(i+1,j),     isoY(i+1,j));
  ctx.lineTo(isoX(i+1,j+1),   isoY(i+1,j+1));
  ctx.lineTo(isoX(i,j+1),     isoY(i,j+1));
  ctx.closePath();
}
const GLYPHS="ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏᛒᛖᛗᛚᛜᛞᛟ";

/* ----- iso prop primitives ----- */
const P=(i,j)=>[isoX(i,j),isoY(i,j)];
function quad(a,b,c,d,fill,stroke){
  ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.lineTo(c[0],c[1]);ctx.lineTo(d[0],d[1]);ctx.closePath();
  ctx.fillStyle=fill;ctx.fill();
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=.7;ctx.stroke();}
}
const flat=(i0,j0,i1,j1,fill,stroke)=>quad(P(i0,j0),P(i1,j0),P(i1,j1),P(i0,j1),fill,stroke);
function shade(hex,f){ // f<1 darker, f>1 lighter
  const n=parseInt(hex.slice(1),16);
  const ch=s=>Math.max(0,Math.min(255,Math.round(s*f)));
  return `rgb(${ch(n>>16)},${ch((n>>8)&255)},${ch(n&255)})`;
}
function box(i0,j0,i1,j1,h,base){
  const A=P(i0,j0),B=P(i1,j0),C=P(i1,j1),D=P(i0,j1);
  const L=p=>[p[0],p[1]-h];
  quad(L(D),L(C),C,D,shade(base,.62));        // left-front face
  quad(L(B),L(C),C,B,shade(base,.8));         // right-front face
  quad(L(A),L(B),L(C),L(D),shade(base,1.18),"rgba(7,9,8,.45)"); // top
}
function wallPlate(i0,i1,j,h,base,glint){ // upright plate standing on a j-line
  const A=P(i0,j),B=P(i1,j),LA=[A[0],A[1]-h],LB=[B[0],B[1]-h];
  quad(LA,LB,B,A,base,"rgba(7,9,8,.5)");
  if(glint){
    const g=.16, A2=P(i0+g,j),B2=P(i1-g,j);
    quad([A2[0],A2[1]-h+4],[B2[0],B2[1]-h+4],[B2[0],B2[1]-4],[A2[0],A2[1]-4],glint);
  }
}
function lightPool(i,j,r,col){
  const [cx,cy]=P(i,j);
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  g.addColorStop(0,col);g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.save();ctx.translate(cx,cy);ctx.scale(1,.5);ctx.translate(-cx,-cy);
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.fill();ctx.restore();
}
function pole(i,j,h,w,base){
  const [x,y]=P(i,j);
  ctx.fillStyle=shade(base,.85);
  ctx.fillRect(x-w/2,y-h,w,h);
  ctx.beginPath();ctx.ellipse(x,y,w*1.4,w*.7,0,0,7);ctx.fillStyle="rgba(0,0,0,.4)";ctx.fill();
}

/* ----- second dressing pass: denser furniture ----- */
function cyl(i,j,r,h,base){
  const [x,y]=P(i,j);
  ctx.fillStyle=shade(base,.78); ctx.fillRect(x-r,y-h,r*2,h);
  ctx.beginPath();ctx.ellipse(x,y,r,r*.5,0,0,7);ctx.fillStyle=shade(base,.55);ctx.fill();

}
function chipStack(i,j,base,n){

  for(let k=1;k<n;k++){ctx.beginPath();ctx.moveTo(x-r,y-k*2.1);ctx.lineTo(x+r,y-k*2.1);ctx.stroke();}
}
function ropePosts(i1,j1,i2,j2){
  const A=P(i1,j1),B=P(i2,j2);

}

function drawVerso(){
  const v=state.verso, c=cam();
  ctx.fillStyle="#0A0F0C"; ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.scale(c.s,c.s); ctx.translate(-c.x,-c.y);

  const showHidden = RVIEW==="dm";
  // floors
  for(const r of ROOMS){
    const rev = !!v.revealed[r.id];
    if(!rev && !showHidden) continue;
    ctx.save();
    if(!rev){ ctx.globalAlpha=.22; }
    const bleedSet = new Set((r.bleed||[]).map(p=>p[0]+","+p[1]));
    for(let i=r.rect.x;i<r.rect.x+r.rect.w;i++){
      for(let j=r.rect.y;j<r.rect.y+r.rect.h;j++){
        const h=hash2(i,j);
        const isBleed = r.bleedAll ? true : bleedSet.has(i+","+j);
        tilePath(i,j);
        if(isBleed){
          ctx.fillStyle = h>.5 ? "#46464B" : "#3D3D42";
        }else{
          ctx.fillStyle = h>.5 ? r.floorA : r.floorB;
        }
        ctx.fill();
        ctx.strokeStyle="rgba(7,9,8,.35)"; ctx.lineWidth=.7; ctx.stroke();
        if(isBleed && rev){
          // under-writing glyph
          const g=GLYPHS[Math.floor(h*GLYPHS.length)];
          const cx=isoX(i+.5,j+.5), cy=isoY(i+.5,j+.5);
          let a=.4;
          if(!REDUCED) a=.28+.2*Math.sin(tNow/900+h*12);
          ctx.save();
          ctx.translate(cx,cy); ctx.scale(1,.5); ctx.rotate(h*6.28);
          ctx.fillStyle=`rgba(127,168,184,${a})`;
          ctx.font="16px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
          ctx.fillText(g,0,0);
          ctx.restore();
        }
      }
    }
    ctx.restore();
  }
  // walls (room perimeters)
  for(const r of ROOMS){
    const rev = !!v.revealed[r.id];
    if(!rev && !showHidden) continue;
    ctx.save();
    if(!rev) ctx.globalAlpha=.3;
    const {x,y,w,h}=r.rect;
    ctx.beginPath();
    ctx.moveTo(isoX(x,y),isoY(x,y));
    ctx.lineTo(isoX(x+w,y),isoY(x+w,y));
    ctx.lineTo(isoX(x+w,y+h),isoY(x+w,y+h));
    ctx.lineTo(isoX(x,y+h),isoY(x,y+h));
    ctx.closePath();
    ctx.strokeStyle=r.wall; ctx.lineWidth=3; ctx.stroke();
    ctx.strokeStyle="rgba(7,9,8,.6)"; ctx.lineWidth=1; ctx.stroke();
    ctx.restore();
  }
  // room dressing
  for(const r of ROOMS){
    const rev = !!v.revealed[r.id];
    if(!rev && !showHidden) continue;
    ctx.save();
    if(!rev) ctx.globalAlpha=.18;
    drawProps(r);
    drawProps2(r);
    ctx.restore();
  }
  // doors / openings
  for(const d of DOORS){
    const len=d.len||1;
    const x2 = d.dir==="h" ? d.x+len : d.x;
    const y2 = d.dir==="h" ? d.y : d.y+len;
    const visible = doorVisible(d);
    if(!visible && RVIEW!=="dm") continue;
    ctx.save();
    if(!visible) ctx.globalAlpha=.3;
    ctx.beginPath();
    ctx.moveTo(isoX(d.x,d.y),isoY(d.x,d.y));
    ctx.lineTo(isoX(x2,y2),isoY(x2,y2));
    if(d.type==="open"){
      ctx.strokeStyle="#2B2125"; ctx.lineWidth=5; ctx.stroke();
    }else{
      ctx.strokeStyle="#0A0F0C"; ctx.lineWidth=6; ctx.stroke();
      ctx.strokeStyle="#C8A14E"; ctx.lineWidth=3; ctx.setLineDash([7,4]); ctx.stroke();
    }
    ctx.restore();
  }
  // room labels (DM always; players only when revealed)
  ctx.textAlign="center";
  for(const r of ROOMS){
    const rev=!!v.revealed[r.id];
    if(!rev && !showHidden) continue;
    const cx=isoX(r.rect.x+r.rect.w/2, r.rect.y+r.rect.h/2);
    const cy=isoY(r.rect.x+r.rect.w/2, r.rect.y+r.rect.h/2);
    ctx.save();
    ctx.globalAlpha = rev?1:.45;
    ctx.font="13px Marcellus, serif";
    ctx.fillStyle = (RVIEW==="dm"&&state.selRoom===r.id) ? "#E9E2CE" : "#C8A14E";
    ctx.strokeStyle="rgba(7,9,8,.85)"; ctx.lineWidth=3; ctx.lineJoin="round";
    const label=r.name.toUpperCase()+(rev?"":" · HIDDEN");
    ctx.strokeText(label,cx,cy); ctx.fillText(label,cx,cy);
    ctx.restore();
  }
  // tokens, depth-sorted
  const toks=[...v.tokens].sort((a,b)=>(a.x+a.y)-(b.x+b.y));
  for(const t of toks){
    if(RVIEW!=="dm"){
      const room=roomAtTile(t.x,t.y);
      if(room && !v.revealed[room.id]) continue;
    }
    drawTokenIso(t,c.s);
  }
  ctx.restore();
}
function doorVisible(d){
  // visible to players if either adjoining room near the segment is revealed
  const probes = d.dir==="h"
    ? [[d.x+.5,d.y-.5],[d.x+.5,d.y+.5]]
    : [[d.x-.5,d.y+.5],[d.x+.5,d.y+.5]];
  return probes.some(([i,j])=>{const r=roomAtTile(i,j);return r && state.verso.revealed[r.id];});
}
function roomAtTile(i,j){
  for(const r of ROOMS){
    if(i>=r.rect.x && i<r.rect.x+r.rect.w && j>=r.rect.y && j<r.rect.y+r.rect.h) return r;
  }
  return null;
}
function drawTokenIso(t,s){
  const cx=isoX(t.x,t.y), cy=isoY(t.x,t.y);
  const r=15*t.size;
  ctx.save();
  // base ellipse
  ctx.beginPath(); ctx.ellipse(cx,cy+4,r*.95,r*.48,0,0,7);
  ctx.fillStyle="rgba(0,0,0,.45)"; ctx.fill();
  // disk
  ctx.beginPath(); ctx.arc(cx,cy-r*.5,r,0,7);
  ctx.fillStyle=t.color; ctx.fill();
  ctx.lineWidth=2.4;
  ctx.strokeStyle = (RVIEW==="dm"&&state.selToken===t.id) ? "#E9E2CE" : "rgba(7,9,8,.65)";
  ctx.stroke();
  ctx.fillStyle="#070908"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.font=`600 ${r*.78}px 'IBM Plex Mono', monospace`;
  ctx.fillText(t.letter,cx,cy-r*.46);
  ctx.font="500 11px 'IBM Plex Mono', monospace";
  ctx.fillStyle="#E9E2CE"; ctx.strokeStyle="rgba(7,9,8,.85)"; ctx.lineWidth=3; ctx.lineJoin="round";
  ctx.strokeText(t.name,cx,cy+r*.9+8); ctx.fillText(t.name,cx,cy+r*.9+8);
  ctx.restore();
}

/* ---------------- ruler ---------------- */
let ruler=null; // {x1,y1,x2,y2} world coords
function drawRuler(){
  if(!ruler) return;
  const c=cam();
  const [sx1,sy1]=toScreen(ruler.x1,ruler.y1);
  const [sx2,sy2]=toScreen(ruler.x2,ruler.y2);
  ctx.save();
  ctx.strokeStyle="#7FA8B8"; ctx.lineWidth=2; ctx.setLineDash([8,5]);
  ctx.beginPath(); ctx.moveTo(sx1,sy1); ctx.lineTo(sx2,sy2); ctx.stroke();
  ctx.setLineDash([]);
  let label;
  if(state.scene==="map"){
    const g=state.map.grid.size||70;
    const d=Math.hypot(ruler.x2-ruler.x1,ruler.y2-ruler.y1)/g;
    label=(d*5).toFixed(0)+" ft · "+d.toFixed(1)+" sq";
  }else{
    const [i1,j1]=unIso(ruler.x1,ruler.y1), [i2,j2]=unIso(ruler.x2,ruler.y2);
    const d=Math.hypot(i2-i1,j2-j1);
    label=(d*5).toFixed(0)+" ft · "+d.toFixed(1)+" tiles";
  }
  ctx.font="600 12px 'IBM Plex Mono', monospace";
  const mx=(sx1+sx2)/2,my=(sy1+sy2)/2;
  const tw=ctx.measureText(label).width;
  ctx.fillStyle="rgba(7,9,8,.85)";
  ctx.fillRect(mx-tw/2-7,my-22,tw+14,18);
  ctx.fillStyle="#7FA8B8"; ctx.textAlign="center";
  ctx.fillText(label,mx,my-9);
  ctx.restore();
}

/* ---------------- online table (WebRTC via PeerJS) ---------------- */
const NET={mode:null,peer:null,conns:new Map(),code:null,myToken:null,myId:null,
  dirty:false,fogDirty:false,imgStamp:0,diceStamp:0,lastDice:null};
function netMark(){NET.dirty=true;}
function netMarkFog(){NET.fogDirty=true;}

function moveAllowed(x,y){
  if(state.scene==="verso"){
    const r=roomAtTile(x,y);
    return !!(r && state.verso.revealed[r.id]);
  }
  const m=state.map;
  if(!m.img) return false;
  if(x<0||y<0||x>m.img.width||y>m.img.height) return false;
  if(!m.fog||!m.fogOn) return true;
  try{
    const px=m.fog.getContext("2d").getImageData(Math.floor(x),Math.floor(y),1,1).data;
    return px[3]<128; // blocked where fog is opaque
  }catch(e){return true;}
}

function lightSnapshot(){
  return {type:"sync",scene:state.scene,revealed:state.verso.revealed,
    grid:state.map.grid,fogOn:state.map.fogOn,
    tokens:{map:state.map.tokens,verso:state.verso.tokens},
    imgStamp:NET.imgStamp,dice:NET.lastDice};
}
function netBroadcast(msg){
  const s=JSON.stringify(msg);
  for(const c of NET.conns.values()){try{c.send(s);}catch(e){}}
}
function sendFullTo(c){
  try{
    c.send(JSON.stringify(lightSnapshot()));
    if(state.map.imgURL) c.send(JSON.stringify({type:"img",data:state.map.imgURL,stamp:NET.imgStamp}));
    if(state.map.fog) c.send(JSON.stringify({type:"fog",data:state.map.fog.toDataURL("image/png")}));
  }catch(e){}
}

/* ----- host ----- */
function hostTable(){
  if(NET.mode==="host"){navigator.clipboard&&navigator.clipboard.writeText(inviteLink());return;}
  if(typeof Peer==="undefined"){alert("Couldn't load the connection library — check your internet and reload.");return;}
  NET.code="verso-"+Math.random().toString(36).slice(2,7);
  NET.peer=new Peer(NET.code);
  NET.peer.on("open",()=>{
    NET.mode="host";
    const el=$("net-status");
    el.style.display="inline";
    el.textContent="TABLE "+NET.code+" · 0 joined ⧉";
    el.onclick=()=>{if(navigator.clipboard)navigator.clipboard.writeText(inviteLink());el.textContent=el.textContent.replace("⧉","copied!");setTimeout(updNetStatus,1200);};
    $("btn-host").textContent="HOSTING";
  });
  NET.peer.on("connection",c=>{
    c.on("open",()=>{NET.conns.set(c.peer,c);updNetStatus();sendFullTo(c);});
    c.on("close",()=>{
      NET.conns.delete(c.peer);
      // release that player's claims
      for(const t of [...state.map.tokens,...state.verso.tokens]) if(t.owner===c.peer) delete t.owner;
      updNetStatus(); netMark(); renderPanel();
    });
    c.on("data",raw=>{
      let m; try{m=JSON.parse(raw);}catch(e){return;}
      hostHandle(c,m);
    });
  });
  NET.peer.on("error",e=>{console.warn("peer error",e);$("net-status").textContent="TABLE ERROR — re-host";});
}
function inviteLink(){
  const base=location.origin.startsWith("http")?location.href.split("?")[0]:"(open the same file)";
  return base+"?join="+NET.code+"   (code: "+NET.code+")";
}
function updNetStatus(){
  const el=$("net-status");
  if(NET.mode==="host") el.textContent="TABLE "+NET.code+" · "+NET.conns.size+" joined ⧉";
}
function hostHandle(c,m){
  if(m.type==="claim"){
    const t=[...state.map.tokens,...state.verso.tokens].find(t=>t.id===m.id);
    if(!t) return;
    if(t.owner && t.owner!==c.peer) return;                 // already someone else's
    for(const o of [...state.map.tokens,...state.verso.tokens]) if(o.owner===c.peer) delete o.owner;
    t.owner=c.peer; netMark(); renderPanel();
  }
  if(m.type==="move"){
    const t=S().tokens.find(t=>t.id===m.id);
    if(!t || t.owner!==c.peer) return;
    if(!moveAllowed(m.x,m.y)) return;                       // authority: reject illegal moves
    t.x=m.x; t.y=m.y; netMark();
  }
  if(m.type==="roll"){
    roll(m.die==="adv"||m.die==="dis"?m.die:+m.die,1,0,"player");
  }
}
/* host loops: light sync + fog */
setInterval(()=>{
  if(NET.mode!=="host") return;
  if(NET.dirty){NET.dirty=false; netBroadcast(lightSnapshot());}
},350);
setInterval(()=>{
  if(NET.mode!=="host"||!NET.fogDirty||!state.map.fog) return;
  NET.fogDirty=false;
  netBroadcast({type:"fog",data:state.map.fog.toDataURL("image/png")});
},1500);
$("btn-host").onclick=hostTable;

/* ----- client ----- */
let clientConn=null, clientDragging=false, cliOX=0, cliOY=0;
function joinTable(code){
  if(typeof Peer==="undefined"){alert("Couldn't load the connection library — check your internet and reload.");return;}
  NET.mode="client";
  document.body.classList.add("netclient");
  setView("pl"); state.view="pl";
  NET.peer=new Peer();
  NET.peer.on("open",id=>{
    NET.myId=id;
    clientConn=NET.peer.connect(code,{reliable:true});
    clientConn.on("open",()=>{
      const el=$("net-status");
      el.style.display="inline"; el.textContent="CONNECTED · "+code;
    });
    clientConn.on("data",raw=>{
      let m; try{m=JSON.parse(raw);}catch(e){return;}
      clientHandle(m);
    });
    clientConn.on("close",()=>{$("net-status").textContent="DISCONNECTED — reload to rejoin";});
  });
  NET.peer.on("error",e=>{$("net-status").style.display="inline";$("net-status").textContent="COULDN'T JOIN — check the code";});
}
let firstSync=true;
function clientHandle(m){
  if(m.type==="sync"){
    if(m.scene!==state.scene){state.scene=m.scene; fitScene(); updZoom();}
    state.verso.revealed=m.revealed||{};
    Object.assign(state.map.grid,m.grid||{});
    state.map.fogOn=m.fogOn!==false;
    // apply tokens, but never overwrite the token I'm actively dragging
    const apply=(dst,src)=>{
      dst.length=0;
      for(const t of src) dst.push(t);
    };
    const mineNow=S().tokens.find(t=>t.id===NET.myToken);
    const keep=(clientDragging&&mineNow)?{...mineNow}:null;
    apply(state.map.tokens,m.tokens.map||[]);
    apply(state.verso.tokens,m.tokens.verso||[]);
    if(keep){
      const t=S().tokens.find(t=>t.id===keep.id);
      if(t){t.x=keep.x;t.y=keep.y;dragTok=t;}   // rebind the live drag to the fresh object
    }
    // verify my claim still holds
    if(NET.myToken!=null){
      const t=[...state.map.tokens,...state.verso.tokens].find(t=>t.id===NET.myToken);
      if(!t||t.owner!==NET.myId) NET.myToken=null;
    }
    if(m.dice && (!NET.lastDice||m.dice.stamp!==NET.lastDice.stamp)){NET.lastDice=m.dice;clientBanner(m.dice);}
    if(firstSync){firstSync=false;fitScene();updZoom();}
    renderPanel();
  }
  if(m.type==="img"){
    const img=new Image();
    img.onload=()=>{state.map.img=img;state.map.imgURL=m.data;if(state.scene==="map")fitScene();};
    img.src=m.data;
  }
  if(m.type==="fog"){
    const fi=new Image();
    fi.onload=()=>{
      if(!state.map.fog||state.map.fog.width!==fi.width){
        const f=document.createElement("canvas");f.width=fi.width;f.height=fi.height;state.map.fog=f;
      }
      const fc=state.map.fog.getContext("2d");
      fc.clearRect(0,0,fi.width,fi.height);fc.drawImage(fi,0,0);
    };
    fi.src=m.data;
  }
}
function clientBanner(d){
  const b=$("net-banner");
  b.innerHTML='<div class="rb-head">'+d.head+'</div><div class="rb-total">'+d.total+'</div><div class="rb-detail">'+d.detail+'</div>';
  b.classList.remove("show");void b.offsetWidth;b.classList.add("show");
  setTimeout(()=>b.classList.remove("show"),4500);
}
function clientSend(msg){if(clientConn)try{clientConn.send(JSON.stringify(msg));}catch(e){}}


let diceLog=[], diceN=1, diceMod=0, bannerTimer=null;
function roll(d,n,mod,who){
  n=Math.max(1,Math.min(10,n|0)); mod=mod|0;
  let results=[],mode=null;
  if(d==="adv"||d==="dis"){
    mode=d; d=20;
    const a=1+Math.floor(Math.random()*20), b=1+Math.floor(Math.random()*20);
    results=[a,b];
    var kept = mode==="adv" ? Math.max(a,b) : Math.min(a,b);
    var total = kept+mod;
  }else{
    for(let k=0;k<n;k++) results.push(1+Math.floor(Math.random()*d));
    var kept=null;
    var total=results.reduce((a,b)=>a+b,0)+mod;
  }
  const entry={d,n:mode?2:n,mod,results,kept,mode,total,who,at:Date.now()};
  diceLog.unshift(entry); diceLog=diceLog.slice(0,10);
  NET.lastDice=Object.assign(fmtRoll(entry),{stamp:++NET.diceStamp});
  netMark();
  renderPanel();
  pushRollBanner(entry);
  if(NET.mode!=="client") clientBanner(NET.lastDice);
  return entry;
}
function fmtRoll(e){
  const die=(e.mode? "d20 "+e.mode.toUpperCase() : e.n+"d"+e.d);
  const mod=e.mod? (e.mod>0?" +"+e.mod:" "+e.mod) : "";
  return {head:die+mod, total:e.total,
    detail:"["+e.results.join(", ")+"]"+(e.kept!=null?" → keep "+e.kept:"")+(e.mod?" "+(e.mod>0?"+":"")+e.mod:"")};
}
function pushRollBanner(e){
  if(!pwin || pwin.closed) return;
  try{
    const d=pwin.document, b=d.getElementById("dice-banner");
    if(!b) return;
    const f=fmtRoll(e);
    const crit = (e.d===20 && (e.kept!=null?e.kept:e.results[0]))===20 && e.n<=2;
    const fumble=(e.d===20 && (e.kept!=null?e.kept:e.results[0]))===1 && e.n<=2;
    b.innerHTML='<div class="rb-head">'+f.head+'</div>'+
      '<div class="rb-total'+(crit?' crit':'')+(fumble?' fumble':'')+'">'+f.total+'</div>'+
      '<div class="rb-detail">'+f.detail+'</div>';
    b.classList.remove("show"); void b.offsetWidth; b.classList.add("show");
    if(bannerTimer) clearTimeout(bannerTimer);
    bannerTimer=setTimeout(()=>{try{b.classList.remove("show");}catch(_){}} ,5200);
  }catch(_){/* window mid-close */}
}

function renderPlayerWindow(){
  if(!pwin || pwin.closed || !pctx) return;
  let pW,pH,pd;
  try{ pW=pwin.innerWidth; pH=pwin.innerHeight; pd=Math.min(pwin.devicePixelRatio||1,2); }
  catch(e){ return; }
  if(!pW||!pH) return;
  if(pcv.width!==Math.round(pW*pd)||pcv.height!==Math.round(pH*pd)){
    pcv.width=Math.round(pW*pd); pcv.height=Math.round(pH*pd);
  }
  pctx.setTransform(pd,0,0,pd,0,0);
  // mirror the DM camera: same world center, zoom fitted to the player window
  const c=S().cam;
  const wcx=c.x+W/(2*c.s), wcy=c.y+H/(2*c.s);
  const s=c.s*Math.min(pW/W,pH/H);
  CAMOVR={x:wcx-pW/(2*s), y:wcy-pH/(2*s), s};
  const oc=ctx,oW=W,oH=H,ov=RVIEW;
  ctx=pctx; W=pW; H=pH; RVIEW="pl";
  ctx.clearRect(0,0,pW,pH);
  if(state.scene==="map") drawMap(); else drawVerso();
  drawRuler();
  ctx=oc; W=oW; H=oH; RVIEW=ov; CAMOVR=null;
}

/* ---------------- main loop ---------------- */
function frame(t){

  drawRuler();

}

/* ---------------- input ---------------- */
let pointers=new Map(), panRef=null, dragTok=null, pinchRef=null, spaceDown=false, downAt=null, fogPainting=false;

function tokenAt(sx,sy){
  const [wx,wy]=toWorld(sx,sy);
  if(state.scene==="map"){
    const g=state.map.grid.size;
    for(let k=state.map.tokens.length-1;k>=0;k--){
      const t=state.map.tokens[k];
      if(Math.hypot(wx-t.x,wy-t.y)<=g*.45*t.size) return t;
    }
  }else{
    const [i,j]=unIso(wx,wy);
    let best=null,bd=1e9;
    for(const t of state.verso.tokens){
      const d=Math.hypot(i-t.x,j-t.y);
      if(d<.75*t.size && d<bd){best=t;bd=d;}
    }
    return best;
  }
  return null;
}
function paintFog(sx,sy){
  const m=state.map; if(!m.img||!m.fog) return;
  const [wx,wy]=toWorld(sx,sy);
  const fctx=m.fog.getContext("2d");
  fctx.save();
  fctx.globalCompositeOperation = state.tool==="fogr" ? "destination-out" : "source-over";
  fctx.fillStyle="#04130C";
  fctx.beginPath(); fctx.arc(wx,wy,m.brush,0,7); fctx.fill();
  fctx.restore();
  markDirty(); netMarkFog();
}

cv.addEventListener("pointerdown",e=>{
  cv.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId,{x:e.offsetX,y:e.offsetY});
  if(pointers.size===2){
    const [a,b]=[...pointers.values()];
    pinchRef={d:Math.hypot(a.x-b.x,a.y-b.y)};
    dragTok=null; panRef=null; return;
  }
  downAt={x:e.offsetX,y:e.offsetY,moved:false};
  if(NET.mode==="client"){
    if(e.button===2){downAt=null;return;}
    const wantPanC = spaceDown || e.button===1;
    if(!wantPanC && state.tool!=="ruler"){
      const t=tokenAt(e.offsetX,e.offsetY);
      if(t && t.id===NET.myToken){
        dragTok=t; clientDragging=true;
        cliOX=t.x; cliOY=t.y;
        state.selToken=t.id; return;
      }
    }
    if(state.tool==="ruler" && !wantPanC){
      const [wx,wy]=toWorld(e.offsetX,e.offsetY);
      ruler={x1:wx,y1:wy,x2:wx,y2:wy}; return;
    }
    panRef={x:e.offsetX,y:e.offsetY,cx:cam().x,cy:cam().y};
    return;
  }
  if(e.button===2){           // right-click a token: delete it
    const t=tokenAt(e.offsetX,e.offsetY);
    if(t && confirm('Remove token "'+t.name+'"?')){
      const arr=S().tokens, i=arr.indexOf(t);
      if(i>=0) arr.splice(i,1);
      if(state.selToken===t.id) state.selToken=null;
      markDirty(); renderPanel(); downAt=null; return;
    }
  }
  const wantPan = spaceDown || e.button===1 || e.button===2;
  if(state.tool==="ruler" && !wantPan){
    const [wx,wy]=toWorld(e.offsetX,e.offsetY);
    ruler={x1:wx,y1:wy,x2:wx,y2:wy};
    return;
  }
  if((state.tool==="fogr"||state.tool==="fogh") && state.scene==="map" && !wantPan){
    fogPainting=true; paintFog(e.offsetX,e.offsetY); return;
  }
  if(!wantPan){
    const t=tokenAt(e.offsetX,e.offsetY);
    if(t){dragTok=t; state.selToken=t.id; renderPanel(); return;}
  }
  panRef={x:e.offsetX,y:e.offsetY,cx:cam().x,cy:cam().y};
});
cv.addEventListener("pointermove",e=>{
  const p=pointers.get(e.pointerId);
  if(p){p.x=e.offsetX;p.y=e.offsetY;}
  // status coords
  const [wx,wy]=toWorld(e.offsetX,e.offsetY);
  if(state.scene==="verso"){
    const [i,j]=unIso(wx,wy);
    $("st-pos").textContent=`tile ${i.toFixed(1)}, ${j.toFixed(1)}`;
  }else{
    $("st-pos").textContent=`${wx.toFixed(0)}, ${wy.toFixed(0)} px`;
  }
  if(pinchRef && pointers.size===2){
    const [a,b]=[...pointers.values()];
    const d=Math.hypot(a.x-b.x,a.y-b.y);
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    if(pinchRef.d>0) zoomAt(mx,my,d/pinchRef.d);
    pinchRef.d=d; updZoom(); return;
  }
  if(downAt && Math.hypot(e.offsetX-downAt.x,e.offsetY-downAt.y)>4) downAt.moved=true;
  if(ruler && state.tool==="ruler" && e.buttons){
    const [rx,ry]=toWorld(e.offsetX,e.offsetY);
    ruler.x2=rx; ruler.y2=ry; return;
  }
  if(fogPainting && e.buttons){paintFog(e.offsetX,e.offsetY);return;}
  if(dragTok && e.buttons){
    if(state.scene==="map"){dragTok.x=wx;dragTok.y=wy;}
    else{const [i,j]=unIso(wx,wy);dragTok.x=i;dragTok.y=j;}
    markDirty(); return;
  }
  if(panRef && e.buttons){
    const c=cam();
    c.x=panRef.cx-(e.offsetX-panRef.x)/c.s;
    c.y=panRef.cy-(e.offsetY-panRef.y)/c.s;
  }
});
cv.addEventListener("pointerup",e=>{
  pointers.delete(e.pointerId);
  if(pointers.size<2) pinchRef=null;
  if(ruler && state.tool==="ruler"){ setTimeout(()=>{ruler=null;},900); }
  if(dragTok && NET.mode==="client"){
    if(state.scene==="map" && state.map.grid.snap && state.map.grid.show){
      const g=state.map.grid.size;
      dragTok.x=Math.floor((dragTok.x-state.map.grid.ox)/g)*g+state.map.grid.ox+g/2;
      dragTok.y=Math.floor((dragTok.y-state.map.grid.oy)/g)*g+state.map.grid.oy+g/2;
    }else if(state.scene==="verso"){
      dragTok.x=Math.floor(dragTok.x)+.5;
      dragTok.y=Math.floor(dragTok.y)+.5;
    }
    if(moveAllowed(dragTok.x,dragTok.y)){
      clientSend({type:"move",id:dragTok.id,x:dragTok.x,y:dragTok.y});
    }else{
      dragTok.x=cliOX; dragTok.y=cliOY;               // snap back: room not revealed / fogged
    }
    clientDragging=false; dragTok=null; panRef=null; fogPainting=false; downAt=null;
    return;
  }
  if(dragTok){
    // snap
    if(state.scene==="map" && state.map.grid.snap && state.map.grid.show){
      const g=state.map.grid.size;
      dragTok.x=Math.floor((dragTok.x-state.map.grid.ox)/g)*g+state.map.grid.ox+g/2;
      dragTok.y=Math.floor((dragTok.y-state.map.grid.oy)/g)*g+state.map.grid.oy+g/2;
    }else if(state.scene==="verso"){
      dragTok.x=Math.floor(dragTok.x)+.5;
      dragTok.y=Math.floor(dragTok.y)+.5;
    }
    markDirty();
  }
  // click (no drag): select room in verso
  if(downAt && !downAt.moved && !dragTok && state.scene==="verso" && state.tool==="select"){
    const [wx,wy]=toWorld(e.offsetX,e.offsetY);
    const [i,j]=unIso(wx,wy);
    const r=roomAtTile(i,j);
    state.selRoom = r ? r.id : null;
    renderPanel();
  }
  if(downAt && !downAt.moved && !dragTok && state.scene==="map" && state.tool==="select"){
    state.selToken=null; renderPanel();
  }
  dragTok=null; panRef=null; fogPainting=false; downAt=null;
});
cv.addEventListener("wheel",e=>{
  e.preventDefault();
  zoomAt(e.offsetX,e.offsetY, e.deltaY<0?1.12:0.89);
  updZoom();
},{passive:false});
cv.addEventListener("contextmenu",e=>e.preventDefault());

addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT") return;
  if(e.code==="Space"){spaceDown=true;cv.style.cursor="grabbing";e.preventDefault();}
  const k=e.key.toLowerCase();
  if(k==="v") setTool("select");
  if(k==="m") setTool("ruler");
  if(k==="r" && state.scene==="map") setTool("fogr");
  if(k==="h" && state.scene==="map") setTool("fogh");
  if(k==="f") fitScene();
  if(k==="g" && state.scene==="map"){state.map.grid.show=!state.map.grid.show;renderPanel();}
  if((k==="delete"||k==="backspace") && state.selToken!=null){
    const arr=S().tokens; const i=arr.findIndex(t=>t.id===state.selToken);
    if(i>=0){arr.splice(i,1);state.selToken=null;renderPanel();markDirty();}
  }
});
addEventListener("keyup",e=>{
  if(e.code==="Space"){spaceDown=false;cv.style.cursor="grab";}
});

function updZoom(){$("st-zoom").textContent=Math.round(cam().s*100)+"%";}

/* ---------------- tools / tabs / view ---------------- */
function setTool(t){
  state.tool=t;
  for(const id of ["select","ruler","fogr","fogh"]) $("t-"+id).classList.toggle("on",id===t);
  cv.className = "tool-"+t;
  const hints={select:"Drag tokens · drag space to pan · wheel to zoom",
    ruler:"Drag to measure (5 ft per square/tile)",
    fogr:"Paint to reveal the map to players",
    fogh:"Paint to hide the map again"};
  $("st-hint").textContent=hints[t];
}
$("t-select").onclick=()=>setTool("select");
$("t-ruler").onclick=()=>setTool("ruler");
$("t-fogr").onclick=()=>setTool("fogr");
$("t-fogh").onclick=()=>setTool("fogh");
$("t-fit").onclick=()=>fitScene();

function setScene(s){
  state.scene=s; state.selToken=null;
  $("tab-map").classList.toggle("on",s==="map");
  $("tab-verso").classList.toggle("on",s==="verso");
  const fogOK = s==="map";
  $("t-fogr").disabled=!fogOK; $("t-fogh").disabled=!fogOK;
  if(!fogOK && (state.tool==="fogr"||state.tool==="fogh")) setTool("select");
  fitScene(); updZoom(); renderPanel();
}
$("tab-map").onclick=()=>setScene("map");
$("tab-verso").onclick=()=>setScene("verso");

function setView(v){
  state.view=v;
  document.body.classList.toggle("playerview",v==="pl");
  $("vw-dm").classList.toggle("on",v==="dm");
  $("vw-pl").classList.toggle("on",v==="pl");

  renderPanel();

$("vw-dm").onclick=()=>setView("dm");
$("vw-pl").onclick=()=>setView("pl");

/* ---------------- map import ---------------- */
function loadImageFile(file){
  const rd=new FileReader();
  rd.onload=()=>loadImageURL(rd.result,file.name);
  rd.readAsDataURL(file);
}
function loadImageURL(url,name){
  const img=new Image();
  img.onload=()=>{
    state.map.img=img; state.map.imgURL=url; state.map.name=name||"map";
    const f=document.createElement("canvas");
    f.width=img.width; f.height=img.height;
    const fc=f.getContext("2d");
    fc.fillStyle="#04130C"; fc.fillRect(0,0,f.width,f.height);
    state.map.fog=f;
    if(state.map.tokens.length===0){
      const g=state.map.grid.size;
      PARTY.slice(0,5).forEach((p,i)=>{
        state.map.tokens.push(mkTok(p.name,p.letter,p.color,g*(1.5+i),g*1.5));
      });
    }
    setScene("map"); markDirty();
  };
  img.src=url;
}
$("file-img").onchange=e=>{if(e.target.files[0]) loadImageFile(e.target.files[0]);e.target.value="";};
const stage=$("stage");
stage.addEventListener("dragover",e=>{e.preventDefault();stage.classList.add("dragging");});
stage.addEventListener("dragleave",()=>stage.classList.remove("dragging"));
stage.addEventListener("drop",e=>{
  e.preventDefault(); stage.classList.remove("dragging");
  const f=[...e.dataTransfer.files].find(f=>f.type.startsWith("image/"));
  if(f) loadImageFile(f);
});

/* ---------------- save / load ---------------- */
function serialize(){
  return {
    v:1, scene:state.scene,
    map:{
      name:state.map.name, imgURL:state.map.imgURL,
      grid:state.map.grid, fogOn:state.map.fogOn, brush:state.map.brush,
      tokens:state.map.tokens,
      fogURL: state.map.fog ? state.map.fog.toDataURL("image/png") : null
    },
    verso:{revealed:state.verso.revealed, tokens:state.verso.tokens}
  };
}
function deserialize(d){
  try{
    state.verso.revealed=d.verso.revealed||{white:true};
    state.verso.tokens=(d.verso.tokens||[]).map(t=>({...t}));
    uid=Math.max(uid,...state.verso.tokens.map(t=>t.id+1),1);
    Object.assign(state.map.grid,d.map.grid||{});
    state.map.fogOn=d.map.fogOn!==false;
    state.map.brush=d.map.brush||90;
    state.map.tokens=(d.map.tokens||[]).map(t=>({...t}));
    uid=Math.max(uid,...state.map.tokens.map(t=>t.id+1),uid);
    if(d.map.imgURL){
      const img=new Image();
      img.onload=()=>{
        state.map.img=img; state.map.imgURL=d.map.imgURL; state.map.name=d.map.name;
        const f=document.createElement("canvas");
        f.width=img.width;f.height=img.height;
        const fc=f.getContext("2d");
        if(d.map.fogURL){
          const fi=new Image();
          fi.onload=()=>{fc.drawImage(fi,0,0);};
          fi.src=d.map.fogURL;
        }else{fc.fillStyle="#04130C";fc.fillRect(0,0,f.width,f.height);}
        state.map.fog=f;
        if(d.scene) setScene(d.scene);
      };
      img.src=d.map.imgURL;
    }else if(d.scene){ setScene(d.scene); }
    renderPanel();
  }catch(err){console.error("load failed",err);}
}
$("btn-save").onclick=()=>{
  const blob=new Blob([JSON.stringify(serialize())],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="palimpsest-session.json";
  a.click(); URL.revokeObjectURL(a.href);
};
$("btn-load").onclick=()=>$("file-json").click();
$("file-json").onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{try{deserialize(JSON.parse(rd.result));}catch(err){alert("That file didn't parse as a saved session.");}};
  rd.readAsText(f); e.target.value="";
};

/* autosave to claude.ai artifact storage when available */
let dirty=false;
function markDirty(){dirty=true; netMark();}
async function autosave(){
  if(NET.mode==="client") return;
  if(!dirty) return; dirty=false;
  try{
    if(typeof window.storage!=="undefined" && window.storage && window.storage.set){
      const d=serialize();
      const s=JSON.stringify(d);
      if(s.length>4500000){ d.map.imgURL=null; d.map.fogURL=null; }
      await window.storage.set("verso-session",JSON.stringify(d));
    }
  }catch(e){/* storage unavailable — file save still works */}
}
setInterval(autosave,8000);
(async function tryRestore(){
  if(new URLSearchParams(location.search).has("join")) return;
  try{
    if(typeof window.storage!=="undefined" && window.storage && window.storage.get){
      const r=await window.storage.get("verso-session");
      if(r && r.value) deserialize(JSON.parse(r.value));
    }
  }catch(e){/* nothing stored yet */}
})();

/* ---------------- right panel ---------------- */
let addColor=SWATCH[0];
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function renderPanel(){
  if(NET.mode==="client"){renderClientPanel();return;}
  const p=$("panel");
  let html="";

  if(state.scene==="verso"){
    const r=ROOMS.find(r=>r.id===state.selRoom);
    html+=`<div class="sect"><h3>Room</h3>`;
    if(r){
      const rev=!!state.verso.revealed[r.id];
      html+=`<div id="roomcard">
        <div class="rc-head"><div class="rc-name">${esc(r.name)}</div>
        <div class="rc-sub">${esc(r.sub).toUpperCase()} · ${rev?"REVEALED":"HIDDEN"}</div></div>
        <div class="rc-body">
          <div class="rc-read">${esc(r.read)}</div>
          <div class="rc-dm">${r.dm}</div>
          <div class="rc-clues">${r.clues.map(c=>`<div>${esc(c)}</div>`).join("")}</div>
        </div>
        <div class="rc-foot dm-only">
          <button class="rbtn" id="rc-toggle">${rev?"HIDE FROM PLAYERS":"REVEAL TO PLAYERS"}</button>
        </div></div>`;
    }else{
      html+=`<div class="hint">Click a room on the map to read it. Reveal rooms as the party reaches them — in Player view, hidden rooms don't exist yet.</div>`;
    }
    html+=`</div>`;
    html+=`<div class="sect dm-only"><h3>Reveal</h3><div class="toklist">`+
      ROOMS.map(r=>`<div class="tok" data-room="${r.id}">
        <span class="dot" style="background:${state.verso.revealed[r.id]?"#C8A14E":"#3a3a35"}"></span>
        <span class="nm">${esc(r.name)}</span>
        <span class="del" data-rev="${r.id}" title="${state.verso.revealed[r.id]?"hide from players":"reveal to players"}" style="color:${state.verso.revealed[r.id]?"#C8A14E":"#666"}">${state.verso.revealed[r.id]?"●":"○"}</span>
      </div>`).join("")+`</div></div>`;
  }else{
    html+=`<div class="sect"><h3>Map</h3>`;
    if(state.map.img){
      html+=`<div class="hint" style="margin-bottom:8px">${esc(state.map.name||"map")} · ${state.map.img.width}×${state.map.img.height}px</div>`;
    }
    html+=`<button class="rbtn" id="btn-import" style="width:100%">IMPORT MAP IMAGE</button></div>`;
    html+=`<div class="sect"><h3>Grid</h3>
      <label class="check"><input type="checkbox" id="g-show" ${state.map.grid.show?"checked":""}> show grid (G)</label>
      <label class="check"><input type="checkbox" id="g-snap" ${state.map.grid.snap?"checked":""}> snap tokens</label>
      <div class="row"><label>size px</label><input type="range" id="g-size" min="20" max="220" value="${state.map.grid.size}"><input type="number" id="g-size-n" value="${state.map.grid.size}"></div>
      <div class="row"><label>offset x</label><input type="range" id="g-ox" min="0" max="${state.map.grid.size}" value="${state.map.grid.ox}"></div>
      <div class="row"><label>offset y</label><input type="range" id="g-oy" min="0" max="${state.map.grid.size}" value="${state.map.grid.oy}"></div>
      <div class="hint">Match size to one 5-ft square on your Inkarnate export, then nudge offsets until lines sit on your walls.</div></div>`;
    html+=`<div class="sect dm-only"><h3>Fog of War</h3>
      <label class="check"><input type="checkbox" id="f-on" ${state.map.fogOn?"checked":""}> fog enabled</label>
      <div class="row"><label>brush</label><input type="range" id="f-brush" min="20" max="300" value="${state.map.brush}"></div>
      <div class="row">
        <button class="rbtn quiet" id="f-all">COVER ALL</button>
        <button class="rbtn quiet" id="f-none">CLEAR ALL</button>
      </div>
      <div class="hint">DM view shows fog at half strength; Player view is opaque. Use the eye tools (R / H) to paint.</div></div>`;
  }

  // dice
  html+=`<div class="sect"><h3>Dice</h3>
    <div class="row" style="flex-wrap:wrap;gap:5px">
      ${[4,6,8,10,12,20,100].map(d=>`<button class="rbtn quiet" data-die="${d}" style="flex:none;padding:6px 9px">d${d}</button>`).join("")}
      <button class="rbtn quiet" data-die="adv" style="flex:none;padding:6px 9px">ADV</button>
      <button class="rbtn quiet" data-die="dis" style="flex:none;padding:6px 9px">DIS</button>
    </div>
    <div class="row"><label>count</label><input type="number" id="dice-n" min="1" max="10" value="${diceN}">
      <label style="width:auto">mod</label><input type="number" id="dice-mod" value="${diceMod}" style="width:58px"></div>
    <div class="toklist">${diceLog.slice(0,6).map(e=>{const f=fmtRoll(e);
      return `<div class="tok" style="cursor:default"><span class="nm" style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--vellum-dim)">${f.head} ${f.detail}</span><span style="font-family:Marcellus,serif;font-size:16px;color:var(--brass)">${f.total}</span></div>`;}).join("")}</div>
    <div class="hint" style="margin-top:6px">Rolls flash on the player window. The tray at the bottom of that window is clickable too (for a table TV).</div></div>`;

  // tokens
  const toks=S().tokens;
  html+=`<div class="sect"><h3>Tokens</h3><div class="toklist">`+
    toks.map(t=>`<div class="tok ${state.selToken===t.id?"sel":""}" data-tok="${t.id}">
      <span class="dot" style="background:${t.color}">${esc(t.letter)}</span>
      <span class="nm">${esc(t.name)}${t.owner?' <span style="font-size:9px;color:var(--under)">· claimed</span>':''}</span>
      <span class="del" data-del="${t.id}" title="remove">✕</span>
    </div>`).join("")+
    `</div></div>`;
  // add token
  html+=`<div class="sect"><h3>Add Token</h3>
    <div class="row"><input type="text" id="at-name" placeholder="name" style="flex:1"></div>
    <div class="swatches">${SWATCH.map(c=>`<span class="sw ${c===addColor?"on":""}" data-c="${c}" style="background:${c}"></span>`).join("")}</div>
    <div class="row"><label>size</label><select id="at-size"><option value="1">Medium</option><option value="2">Large</option><option value="3">Huge</option></select></div>
    <button class="rbtn" id="addtok-btn">PLACE TOKEN</button>
    <div class="hint" style="margin-top:8px">Party shortcuts:</div>
    <div class="toklist" style="margin-top:5px">${PARTY.map((p,i)=>`<div class="tok" data-party="${i}">
      <span class="dot" style="background:${p.color}">${esc(p.letter)}</span><span class="nm">${esc(p.name)}</span></div>`).join("")}</div>
  </div>`;

  p.innerHTML=html;

  /* wire panel events */
  if(state.scene==="verso"){
    const tg=$("rc-toggle");
    if(tg) tg.onclick=()=>{
      const id=state.selRoom;
      state.verso.revealed[id]=!state.verso.revealed[id];
      markDirty(); renderPanel();
    };
    p.querySelectorAll("[data-room]").forEach(el=>{
      el.onclick=e=>{
        if(e.target.dataset.rev){
          const id=e.target.dataset.rev;
          state.verso.revealed[id]=!state.verso.revealed[id];
          markDirty(); renderPanel(); return;
        }
        state.selRoom=el.dataset.room; renderPanel();
      };
    });
  }else{
    const bi=$("btn-import"); if(bi) bi.onclick=()=>$("file-img").click();
    const gs=$("g-show"); if(gs) gs.onchange=e=>{state.map.grid.show=e.target.checked;markDirty();};
    const gp=$("g-snap"); if(gp) gp.onchange=e=>{state.map.grid.snap=e.target.checked;markDirty();};
    const sz=$("g-size"), szn=$("g-size-n");
    if(sz) sz.oninput=e=>{state.map.grid.size=+e.target.value;szn.value=e.target.value;markDirty();};
    if(szn) szn.onchange=e=>{state.map.grid.size=Math.max(10,+e.target.value||70);sz.value=state.map.grid.size;markDirty();};
    const ox=$("g-ox"); if(ox) ox.oninput=e=>{state.map.grid.ox=+e.target.value;markDirty();};
    const oy=$("g-oy"); if(oy) oy.oninput=e=>{state.map.grid.oy=+e.target.value;markDirty();};
    const fo=$("f-on"); if(fo) fo.onchange=e=>{state.map.fogOn=e.target.checked;markDirty();};
    const fb=$("f-brush"); if(fb) fb.oninput=e=>{state.map.brush=+e.target.value;};
    const fa=$("f-all"); if(fa) fa.onclick=()=>{
      if(!state.map.fog) return;
      const fc=state.map.fog.getContext("2d");
      fc.globalCompositeOperation="source-over";
      fc.fillStyle="#04130C"; fc.fillRect(0,0,state.map.fog.width,state.map.fog.height); markDirty(); netMarkFog();
    };
    const fn=$("f-none"); if(fn) fn.onclick=()=>{
      if(!state.map.fog) return;
      state.map.fog.getContext("2d").clearRect(0,0,state.map.fog.width,state.map.fog.height); markDirty(); netMarkFog();
    };
  }
  p.querySelectorAll("[data-die]").forEach(el=>{
    el.onclick=()=>{
      const v=el.dataset.die;
      roll(v==="adv"||v==="dis"?v:+v, diceN, diceMod, "dm");
    };
  });
  const dn=$("dice-n"); if(dn) dn.onchange=e=>{diceN=Math.max(1,Math.min(10,+e.target.value||1));};
  const dm=$("dice-mod"); if(dm) dm.onchange=e=>{diceMod=(+e.target.value)|0;};
  p.querySelectorAll("[data-tok]").forEach(el=>{
    el.onclick=e=>{
      if(e.target.dataset.del) return;
      const id=+el.dataset.tok;
      state.selToken=id;
      const t=S().tokens.find(t=>t.id===id);
      if(t){ // center camera on token
        const c=cam();
        if(state.scene==="map"){c.x=t.x-W/(2*c.s);c.y=t.y-H/(2*c.s);}
        else{c.x=isoX(t.x,t.y)-W/(2*c.s);c.y=isoY(t.x,t.y)-H/(2*c.s);}
      }
      renderPanel();
    };
  });
  p.querySelectorAll("[data-del]").forEach(el=>{
    el.onclick=()=>{
      const id=+el.dataset.del;
      const arr=S().tokens, i=arr.findIndex(t=>t.id===id);
      if(i>=0) arr.splice(i,1);
      if(state.selToken===id) state.selToken=null;
      markDirty(); renderPanel();
    };
  });
  p.querySelectorAll(".sw").forEach(el=>{
    el.onclick=()=>{addColor=el.dataset.c;p.querySelectorAll(".sw").forEach(s=>s.classList.toggle("on",s===el));};
  });
  const ab=$("addtok-btn");
  if(ab) ab.onclick=()=>{
    const name=($("at-name").value||"Token").trim();
    const size=+$("at-size").value;
    placeToken(name, name.replace(/[^A-Za-z]/g,"").slice(0,2).toUpperCase()||"?", addColor, size);
  };
  p.querySelectorAll("[data-party]").forEach(el=>{
    el.onclick=()=>{const pp=PARTY[+el.dataset.party];placeToken(pp.name,pp.letter,pp.color,1);};
  });
}
function placeToken(name,letter,color,size){
  const c=cam();
  let x,y;
  if(state.scene==="map"){
    [x,y]=toWorld(W/2,H/2);
  }else{
    const [wx,wy]=toWorld(W/2,H/2);
    const [i,j]=unIso(wx,wy);
    x=Math.floor(i)+.5; y=Math.floor(j)+.5;
  }
  const t=mkTok(name,letter,color,x,y,size);
  S().tokens.push(t);
  state.selToken=t.id;
  markDirty(); renderPanel();
}

function renderClientPanel(){
  const p=$("panel");
  const toks=S().tokens;
  let html=`<div class="sect"><h3>Your Character</h3>`;
  if(NET.myToken==null){
    html+=`<div class="hint" style="margin-bottom:8px">Claim your character. You'll be able to move only that token, and only into rooms the DM has revealed.</div>`;
  }
  html+=`<div class="toklist">`+toks.map(t=>{
    const mine=t.id===NET.myToken;
    const taken=t.owner&&t.owner!==NET.myId;
    return `<div class="tok ${mine?"sel":""}" data-claim="${t.id}" style="${taken?"opacity:.45":""}">
      <span class="dot" style="background:${t.color}">${esc(t.letter)}</span>
      <span class="nm">${esc(t.name)}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;color:${mine?"var(--brass)":"var(--vellum-dim)"}">${mine?"YOURS":taken?"TAKEN":"CLAIM"}</span>
    </div>`;}).join("")+`</div></div>`;
  html+=`<div class="sect"><h3>Dice</h3>
    <div class="row" style="flex-wrap:wrap;gap:5px">
      ${[4,6,8,10,12,20,100].map(d=>`<button class="rbtn quiet" data-cdie="${d}" style="flex:none;padding:6px 9px">d${d}</button>`).join("")}
      <button class="rbtn quiet" data-cdie="adv" style="flex:none;padding:6px 9px">ADV</button>
      <button class="rbtn quiet" data-cdie="dis" style="flex:none;padding:6px 9px">DIS</button>
    </div>
    <div class="hint">Rolls go to the whole table.</div></div>`;
  html+=`<div class="sect"><h3>Table</h3>
    <div class="hint">Drag your token to move. Drag empty space to pan, scroll to zoom, M for ruler, F to re-center. Rooms appear as the party discovers them.</div></div>`;
  p.innerHTML=html;
  p.querySelectorAll("[data-claim]").forEach(el=>{
    el.onclick=()=>{
      const id=+el.dataset.claim;
      const t=S().tokens.find(t=>t.id===id);
      if(!t||(t.owner&&t.owner!==NET.myId))return;
      NET.myToken=id;
      clientSend({type:"claim",id});
      renderPanel();
    };
  });
  p.querySelectorAll("[data-cdie]").forEach(el=>{
    el.onclick=()=>clientSend({type:"roll",die:el.dataset.cdie});
  });
}

/* ---------------- boot ---------------- */
resize();
setScene("verso");
setTool("select");
fitScene(); updZoom();
renderPanel();
requestAnimationFrame(frame);
{
  const DM_PASS="mindthecarpet";   // <-- change this to whatever you like
  const jc=new URLSearchParams(location.search).get("join");
  const gate=$("dmgate");
  let unlocked=false;
  try{unlocked=sessionStorage.getItem("verso-dm")==="ok";}catch(e){}
  if(jc){
    gate.remove();
    joinTable(jc.trim());
  }else if(unlocked){
    gate.remove();
  }else{
    const tryPass=()=>{
      if($("dmpass").value===DM_PASS){
        try{sessionStorage.setItem("verso-dm","ok");}catch(e){}
        gate.remove();
      }else{
        $("dmerr").textContent="the house does not recognize you";
        gate.classList.remove("shake");void gate.offsetWidth;gate.classList.add("shake");
        $("dmpass").value="";$("dmpass").focus();
      }
    };
    $("dmgo").onclick=tryPass;
    $("dmpass").addEventListener("keydown",e=>{if(e.key==="Enter")tryPass();});
    $("dmpass").focus();
  }
}
