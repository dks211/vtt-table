<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Verso — Table Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Spectral:ital,wght@0,300;0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --felt-950:#0A0F0C;
  --felt-900:#0E1411;
  --felt-800:#142019;
  --baize:#1B2D23;
  --baize-line:#27402F;
  --brass:#C8A14E;
  --brass-dim:#8A6E36;
  --brass-faint:#5A4A28;
  --vellum:#E9E2CE;
  --vellum-dim:#ABA38C;
  --oxblood:#8A2E25;
  --under:#7FA8B8;
  --ink:#070908;
  --panel-w:312px;
  --rail-w:54px;
  --top-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--felt-950);color:var(--vellum);
  font-family:'Spectral',Georgia,serif;font-size:15px}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--vellum);
  background:var(--felt-900);border:1px solid var(--brass-faint);border-radius:3px;padding:5px 7px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--brass)}
textarea{width:100%;resize:vertical;line-height:1.45;font-size:11px}
input[type=color]{padding:1px 2px;width:40px;height:26px;cursor:pointer}
::selection{background:var(--brass);color:var(--ink)}

/* ---------- top bar ---------- */
#topbar{position:fixed;inset:0 0 auto 0;height:var(--top-h);display:flex;align-items:center;gap:14px;
  padding:0 14px;background:linear-gradient(180deg,var(--felt-800),var(--felt-900));
  border-bottom:1px solid var(--brass-faint);z-index:30}
#wordmark{font-family:'Marcellus',serif;font-size:19px;letter-spacing:.14em;color:var(--brass);white-space:nowrap}
#wordmark small{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.22em;color:var(--vellum-dim);
  display:block;margin-top:-2px}
.tabs{display:flex;gap:2px;margin-left:6px}
.tab{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px 13px;
  color:var(--vellum-dim);border:1px solid transparent;border-radius:3px}
.tab:hover{color:var(--vellum)}
.tab.on{color:var(--brass);border-color:var(--brass-faint);background:var(--felt-950)}
#topbar .spacer{flex:1}
.viewswitch{display:flex;border:1px solid var(--brass-faint);border-radius:3px;overflow:hidden}
.viewswitch button{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px 12px;color:var(--vellum-dim)}
.viewswitch button.on{background:var(--brass);color:var(--ink)}
.tbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px 12px;
  border:1px solid var(--brass-faint);border-radius:3px;color:var(--vellum-dim)}
.tbtn:hover{color:var(--brass);border-color:var(--brass-dim)}

/* ---------- tool rail ---------- */
#rail{position:fixed;left:0;top:var(--top-h);bottom:26px;width:var(--rail-w);z-index:20;
  display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:12px;
  background:var(--felt-900);border-right:1px solid var(--brass-faint)}
.tool{width:38px;height:38px;border-radius:4px;display:grid;place-items:center;color:var(--vellum-dim);
  border:1px solid transparent}
.tool svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.tool:hover{color:var(--vellum)}
.tool.on{color:var(--brass);border-color:var(--brass-dim);background:var(--felt-950)}
.tool[disabled]{opacity:.25;pointer-events:none}
.rail-rule{width:26px;height:1px;background:var(--brass-faint);margin:5px 0}
.tool .kbd{position:absolute;display:none}

/* ---------- canvas ---------- */
#stage{position:fixed;left:var(--rail-w);right:var(--panel-w);top:var(--top-h);bottom:26px;background:var(--felt-950)}
#cv{width:100%;height:100%;display:block;touch-action:none;cursor:grab}
#cv.tool-fogr,#cv.tool-fogh{cursor:crosshair}
#cv.tool-ruler{cursor:crosshair}
#dropzone{position:absolute;inset:0;display:none;place-items:center;background:rgba(14,20,17,.85);
  border:2px dashed var(--brass-dim);z-index:5;pointer-events:none;
  font-family:'Marcellus',serif;font-size:20px;letter-spacing:.1em;color:var(--brass)}
#stage.dragging #dropzone{display:grid}

/* ---------- right panel ---------- */
#panel{position:fixed;right:0;top:var(--top-h);bottom:26px;width:var(--panel-w);z-index:20;overflow-y:auto;
  background:var(--felt-900);border-left:1px solid var(--brass-faint);padding:14px 14px 28px;
  scrollbar-width:thin;scrollbar-color:var(--brass-faint) transparent}
.sect{margin-bottom:20px}
.sect h3{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.24em;
  color:var(--brass-dim);text-transform:uppercase;margin-bottom:9px;
  display:flex;align-items:center;gap:8px}
.sect h3::after{content:"";flex:1;height:1px;background:var(--brass-faint)}
.hint{font-size:13px;line-height:1.55;color:var(--vellum-dim);font-style:italic}
.row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.row label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--vellum-dim);width:64px;flex:none}
.row input[type=range]{flex:1;accent-color:var(--brass)}
.row input[type=number]{width:64px}
.row input[type=text]{flex:1}
.check{display:flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:var(--vellum-dim);cursor:pointer;margin-bottom:8px}
.check input{accent-color:var(--brass)}

/* room card */
#roomcard{border:1px solid var(--brass-dim);border-radius:4px;background:var(--felt-950);overflow:hidden}
#roomcard .rc-head{padding:10px 12px;background:linear-gradient(180deg,var(--felt-800),var(--felt-950));
  border-bottom:1px solid var(--brass-faint)}
#roomcard .rc-name{font-family:'Marcellus',serif;font-size:17px;color:var(--brass);letter-spacing:.05em}
#roomcard .rc-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--vellum-dim);margin-top:2px}
#roomcard .rc-body{padding:11px 12px}
#roomcard .rc-read{font-size:13.5px;line-height:1.6;color:var(--vellum)}
#roomcard .rc-dm{margin-top:10px;padding:9px 10px;border-left:2px solid var(--oxblood);background:rgba(138,46,37,.07);
  font-size:13px;line-height:1.55;color:var(--vellum-dim)}
#roomcard .rc-dm b{color:var(--vellum);font-weight:600}
#roomcard .rc-clues{margin-top:10px}
#roomcard .rc-clues div{font-size:12.5px;line-height:1.5;color:var(--under);padding:3px 0 3px 16px;position:relative}
#roomcard .rc-clues div::before{content:"◈";position:absolute;left:0;color:var(--brass-dim);font-size:10px;top:6px}
#roomcard .rc-foot{padding:9px 12px;border-top:1px solid var(--brass-faint);display:flex;gap:8px}
.rbtn{flex:1;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px;
  border:1px solid var(--brass-dim);border-radius:3px;color:var(--brass)}
.rbtn:hover{background:var(--brass);color:var(--ink)}
.rbtn.quiet{border-color:var(--brass-faint);color:var(--vellum-dim)}

/* tokens */
.toklist{display:flex;flex-direction:column;gap:4px}
.tok{display:flex;align-items:center;gap:9px;padding:6px 8px;border:1px solid transparent;border-radius:3px;cursor:pointer}
.tok:hover{border-color:var(--brass-faint);background:var(--felt-950)}
.tok.sel{border-color:var(--brass-dim);background:var(--felt-950)}
.tok .dot{width:15px;height:15px;border-radius:50%;flex:none;border:1.5px solid rgba(233,226,206,.55);
  display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;color:var(--ink)}
.tok .nm{flex:1;font-size:13px;color:var(--vellum);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tok .del{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--vellum-dim);padding:2px 5px;border-radius:3px}
.tok .del:hover{color:var(--oxblood);background:rgba(138,46,37,.15)}
.swatches{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.sw{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.sw.on{border-color:var(--vellum)}
#addtok-btn{width:100%}

/* status bar */
#status{position:fixed;left:0;right:0;bottom:0;height:26px;display:flex;align-items:center;gap:18px;
  padding:0 12px;background:var(--felt-900);border-top:1px solid var(--brass-faint);z-index:30;
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--vellum-dim)}
#status .spacer{flex:1}
#st-view{color:var(--brass)}

/* player-view masking */
body.playerview #roomcard .rc-dm,body.playerview #roomcard .rc-clues,
body.playerview .dm-only{display:none!important}

@media (prefers-reduced-motion: reduce){ :root{--shimmer:0} }
#tracker-float{position:fixed;left:calc(var(--rail-w) + 10px);top:calc(var(--top-h) + 10px);z-index:15;
  display:none;flex-direction:column;gap:2px;max-height:46vh;overflow-y:auto;pointer-events:none;
  background:rgba(14,20,17,.88);border:1px solid var(--brass-faint);border-radius:5px;padding:8px 11px;
  font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--vellum-dim)}
#tracker-float .tfh{font-size:9px;letter-spacing:.22em;color:var(--brass-dim);margin-bottom:3px}
#tracker-float .tfr{display:flex;gap:8px;white-space:nowrap}
#tracker-float .tfr.on{color:var(--brass)}
#tracker-float .tfr .n{min-width:22px;text-align:right}
body.netclient #tracker-float{left:10px}
#rolls-float{position:fixed;right:calc(var(--panel-w) + 14px);bottom:44px;z-index:28;width:256px;display:none;
  background:rgba(14,20,17,.95);border:1px solid var(--brass-dim);border-radius:6px;padding:10px 12px;
  box-shadow:0 8px 28px rgba(0,0,0,.55)}
#rolls-float .rfh{display:flex;align-items:center;gap:8px;cursor:grab;margin-bottom:8px;user-select:none;
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--brass)}
#rolls-float .rfh .x{margin-left:auto;cursor:pointer;color:var(--vellum-dim);padding:2px 6px}
#rolls-float .rfh .x:hover{color:var(--oxblood)}
body.netclient #rolls-float{right:12px;bottom:120px}
@media (max-width:760px){ body.netclient #rolls-float{left:8px;right:8px;width:auto} }
#net-banner{position:fixed;top:70px;left:50%;transform:translateX(-50%) scale(.8);opacity:0;pointer-events:none;
  text-align:center;transition:opacity .25s,transform .25s;z-index:40;text-shadow:0 2px 14px rgba(0,0,0,.9)}
#net-banner.show{opacity:1;transform:translateX(-50%) scale(1)}
#net-banner .rb-head{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.22em;color:var(--vellum-dim)}
#net-banner .rb-total{font-family:Marcellus,serif;font-size:72px;line-height:1;color:var(--vellum)}
#net-banner .rb-detail{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--under)}
body.netclient #rail,body.netclient .tabs,body.netclient .viewswitch,
body.netclient #btn-save,body.netclient #btn-load,body.netclient #btn-host,body.netclient #btn-pwin{display:none!important}
body.netclient #stage{left:0}
#fit-float,#panel-toggle{display:none;position:fixed;z-index:26;
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:9px 14px;
  background:var(--felt-900);border:1px solid var(--brass-dim);border-radius:4px;color:var(--brass)}
#dicebar{display:none}
@media (max-width:760px){
  body.netclient #wordmark{font-size:15px}
  body.netclient #wordmark small{display:none}
  body.netclient #stage{right:0}
  body.netclient #dicebar{display:flex;position:fixed;left:0;right:0;bottom:26px;z-index:24;gap:4px;
    padding:7px 8px;background:var(--felt-900);border-top:1px solid var(--brass-faint)}
  body.netclient #dicebar button{flex:1;min-width:0;font-family:'IBM Plex Mono',monospace;font-size:10px;
    padding:9px 0;border:1px solid var(--brass-faint);border-radius:3px;color:var(--brass)}
  body.netclient #dicebar button:active{background:var(--brass);color:var(--ink)}
  body.netclient #panel{left:0;right:0;top:auto;bottom:71px;width:100%;max-height:46vh;
    border-left:none;border-top:1px solid var(--brass-dim);
    transform:translateY(calc(100% + 72px));transition:transform .22s ease;z-index:25}
  body.netclient.panelopen #panel{transform:none}
  body.netclient #panel-toggle{display:block;right:10px;bottom:81px}
  body.netclient #fit-float{display:block;left:10px;bottom:81px;border-color:var(--brass-faint);color:var(--vellum-dim)}
  body.netclient #st-hint{display:none}
}
#dmgate{position:fixed;inset:0;z-index:100;display:grid;place-items:center;background:#0A0F0C}
#dmgate .gcard{text-align:center;padding:36px 44px;border:1px solid var(--brass-faint);border-radius:6px;background:var(--felt-900)}
#dmgate h1{font-family:Marcellus,serif;font-size:26px;letter-spacing:.14em;color:var(--brass);margin-bottom:4px}
#dmgate .gsub{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.24em;color:var(--vellum-dim);margin-bottom:22px}
#dmgate input{width:220px;text-align:center;font-size:14px;padding:9px}
#dmgate .gbtn{display:block;margin:12px auto 0;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;
  padding:8px 22px;border:1px solid var(--brass-dim);border-radius:3px;color:var(--brass);cursor:pointer}
#dmgate .gbtn:hover{background:var(--brass);color:var(--ink)}
#dmgate .gerr{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--oxblood);height:14px;margin-top:10px}
#dmgate.shake .gcard{animation:gshake .3s}
@keyframes gshake{25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
</style>
</head>
<body>

<div id="dmgate">
  <div class="gcard">
    <h1>THE VERSO</h1>
    <div class="gsub">DM CONSOLE · LOCAL SCREEN LOCK</div>
    <input type="password" id="dmpass" placeholder="passphrase" autocomplete="off">
    <button class="gbtn" id="dmgo">ENTER</button>
    <div class="gerr" id="dmerr"></div>
  </div>
</div>
<header id="topbar">
  <div id="wordmark">THE VERSO<small>TABLE CONSOLE</small></div>
  <nav class="tabs">
    <button class="tab" id="tab-map">YOUR MAP</button>
    <button class="tab on" id="tab-verso">THE VERSO · BACK OF HOUSE</button>
    <button class="tab" id="tab-edit" title="Draw rooms on a top-down grid, write descriptions, save levels">EDITOR</button>
  </nav>
  <div class="spacer"></div>
  <div class="viewswitch" title="Player view hides DM notes, fog contents and unrevealed rooms">
    <button id="vw-dm" class="on">DM</button><button id="vw-pl">PLAYER</button>
  </div>
  <span id="net-status" style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--under);cursor:pointer;display:none" title="click to copy invite link"></span>
  <button class="tbtn" id="btn-host" title="Host an online table — players join with a code from their own devices">HOST TABLE</button>
  <button class="tbtn" id="btn-pwin" title="Open a separate live player-view window — share THAT window, keep this one private">PLAYER WINDOW ↗</button>
  <button class="tbtn" id="btn-save">SAVE</button>
  <button class="tbtn" id="btn-load">LOAD</button>
</header>

<aside id="rail">
  <button class="tool on" id="t-select" title="Select / move tokens · pan empty space  (V)">
    <svg viewBox="0 0 24 24"><path d="M6 3l12 9-5.5 1.2L10 19z"/></svg></button>
  <button class="tool" id="t-ruler" title="Ruler — drag to measure  (M)">
    <svg viewBox="0 0 24 24"><path d="M3 17L17 3l4 4L7 21zM8 16l1.5 1.5M11 13l1.5 1.5M14 10l1.5 1.5M17 7l1.5 1.5"/></svg></button>
  <div class="rail-rule"></div>
  <button class="tool" id="t-fogr" title="Reveal fog (uploaded map only)  (R)">
    <svg viewBox="0 0 24 24"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="2.6"/></svg></button>
  <button class="tool" id="t-fogh" title="Hide with fog (uploaded map only)  (H)">
    <svg viewBox="0 0 24 24"><path d="M4 4l16 16M2 12s3.5-6 10-6c1.6 0 3 .35 4.3.9M22 12s-3.5 6-10 6c-1.6 0-3-.35-4.3-.9"/></svg></button>
  <div class="rail-rule"></div>
  <button class="tool" id="t-fit" title="Fit scene to screen  (F)">
    <svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
</aside>

<main id="stage">
  <canvas id="cv"></canvas>
  <div id="dropzone">DROP MAP IMAGE</div>
</main>

<aside id="panel"></aside>

<div id="net-banner"></div>
<div id="tracker-float"></div>
<div id="rolls-float"></div>
<button id="fit-float">⤢ FIT</button>
<button id="panel-toggle">✕ CLOSE</button>
<div id="dicebar">
  <button data-bdie="4">d4</button><button data-bdie="6">d6</button><button data-bdie="8">d8</button>
  <button data-bdie="10">d10</button><button data-bdie="12">d12</button><button data-bdie="20">d20</button>
  <button data-bdie="100">d100</button><button data-bdie="adv">ADV</button><button data-bdie="dis">DIS</button>
</div>
<footer id="status">
  <span id="st-view">DM VIEW</span>
  <span id="st-hint">Drag tokens · drag space to pan · wheel to zoom</span>
  <span class="spacer"></span>
  <span id="st-pos"></span>
  <span id="st-zoom"></span>
</footer>

<input type="file" id="file-img" accept="image/*" hidden>
<input type="file" id="file-json" accept="application/json" hidden>
<input type="file" id="file-level" accept="application/json" hidden>
<input type="file" id="file-sheet" accept=".csv,text/csv" hidden>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<script src="app/core.js"></script>
<script src="content/catalog.js"></script>
<script src="app/state-render.js"></script>
<script src="app/network.js"></script>
<script src="app/table.js"></script>
<script src="app/editor.js"></script>
<script src="app/panel.js"></script>
<script src="app/boot.js"></script>
</body>
</html>
