<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Verso — Table Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Spectral:ital,wght@0,300;0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --felt-950:#0A0F0C;
  --felt-900:#0E1411;
  --felt-800:#142019;
  --baize:#1B2D23;
  --baize-line:#27402F;
  --brass:#C8A14E;
  --brass-dim:#8A6E36;
  --brass-faint:#5A4A28;
  --vellum:#E9E2CE;
  --vellum-dim:#ABA38C;
  --oxblood:#8A2E25;
  --under:#7FA8B8;
  --ink:#070908;
  --panel-w:312px;
  --rail-w:54px;
  --top-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--felt-950);color:var(--vellum);
  font-family:'Spectral',Georgia,serif;font-size:15px}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--vellum);
  background:var(--felt-900);border:1px solid var(--brass-faint);border-radius:3px;padding:5px 7px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--brass)}
textarea{width:100%;resize:vertical;line-height:1.45;font-size:11px}
input[type=color]{padding:1px 2px;width:40px;height:26px;cursor:pointer}
::selection{background:var(--brass);color:var(--ink)}

/* ---------- top bar ---------- */
#topbar{position:fixed;inset:0 0 auto 0;height:var(--top-h);display:flex;align-items:center;gap:14px;
  padding:0 14px;background:linear-gradient(180deg,var(--felt-800),var(--felt-900));
  border-bottom:1px solid var(--brass-faint);z-index:30}
#wordmark{font-family:'Marcellus',serif;font-size:19px;letter-spacing:.14em;color:var(--brass);white-space:nowrap}
#wordmark small{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.22em;color:var(--vellum-dim);
  display:block;margin-top:-2px}
.tabs{display:flex;gap:2px;margin-left:6px}
.tab{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px 13px;
  color:var(--vellum-dim);border:1px solid transparent;border-radius:3px}
.tab:hover{color:var(--vellum)}
.tab.on{color:var(--brass);border-color:var(--brass-faint);background:var(--felt-950)}
#topbar .spacer{flex:1}
.viewswitch{display:flex;border:1px solid var(--brass-faint);border-radius:3px;overflow:hidden}
.viewswitch button{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px 12px;color:var(--vellum-dim)}
.viewswitch button.on{background:var(--brass);color:var(--ink)}
.tbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px 12px;
  border:1px solid var(--brass-faint);border-radius:3px;color:var(--vellum-dim)}
.tbtn:hover{color:var(--brass);border-color:var(--brass-dim)}

/* ---------- tool rail ---------- */
#rail{position:fixed;left:0;top:var(--top-h);bottom:26px;width:var(--rail-w);z-index:20;
  display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:12px;
  background:var(--felt-900);border-right:1px solid var(--brass-faint)}
.tool{width:38px;height:38px;border-radius:4px;display:grid;place-items:center;color:var(--vellum-dim);
  border:1px solid transparent}
.tool svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.tool:hover{color:var(--vellum)}
.tool.on{color:var(--brass);border-color:var(--brass-dim);background:var(--felt-950)}
.tool[disabled]{opacity:.25;pointer-events:none}
.rail-rule{width:26px;height:1px;background:var(--brass-faint);margin:5px 0}
.tool .kbd{position:absolute;display:none}

/* ---------- canvas ---------- */
#stage{position:fixed;left:var(--rail-w);right:var(--panel-w);top:var(--top-h);bottom:26px;background:var(--felt-950)}
#cv{width:100%;height:100%;display:block;touch-action:none;cursor:grab}
#cv.tool-fogr,#cv.tool-fogh{cursor:crosshair}
#cv.tool-ruler{cursor:crosshair}
#dropzone{position:absolute;inset:0;display:none;place-items:center;background:rgba(14,20,17,.85);
  border:2px dashed var(--brass-dim);z-index:5;pointer-events:none;
  font-family:'Marcellus',serif;font-size:20px;letter-spacing:.1em;color:var(--brass)}
#stage.dragging #dropzone{display:grid}

/* ---------- right panel ---------- */
#panel{position:fixed;right:0;top:var(--top-h);bottom:26px;width:var(--panel-w);z-index:20;overflow-y:auto;
  background:var(--felt-900);border-left:1px solid var(--brass-faint);padding:14px 14px 28px;
  scrollbar-width:thin;scrollbar-color:var(--brass-faint) transparent}
.sect{margin-bottom:20px}
.sect h3{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.24em;
  color:var(--brass-dim);text-transform:uppercase;margin-bottom:9px;
  display:flex;align-items:center;gap:8px}
.sect h3::after{content:"";flex:1;height:1px;background:var(--brass-faint)}
.hint{font-size:13px;line-height:1.55;color:var(--vellum-dim);font-style:italic}
.row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.row label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--vellum-dim);width:64px;flex:none}
.row input[type=range]{flex:1;accent-color:var(--brass)}
.row input[type=number]{width:64px}
.row input[type=text]{flex:1}
.check{display:flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:var(--vellum-dim);cursor:pointer;margin-bottom:8px}
.check input{accent-color:var(--brass)}

/* room card */
#roomcard{border:1px solid var(--brass-dim);border-radius:4px;background:var(--felt-950);overflow:hidden}
#roomcard .rc-head{padding:10px 12px;background:linear-gradient(180deg,var(--felt-800),var(--felt-950));
  border-bottom:1px solid var(--brass-faint)}
#roomcard .rc-name{font-family:'Marcellus',serif;font-size:17px;color:var(--brass);letter-spacing:.05em}
#roomcard .rc-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--vellum-dim);margin-top:2px}
#roomcard .rc-body{padding:11px 12px}
#roomcard .rc-read{font-size:13.5px;line-height:1.6;color:var(--vellum)}
#roomcard .rc-dm{margin-top:10px;padding:9px 10px;border-left:2px solid var(--oxblood);background:rgba(138,46,37,.07);
  font-size:13px;line-height:1.55;color:var(--vellum-dim)}
#roomcard .rc-dm b{color:var(--vellum);font-weight:600}
#roomcard .rc-clues{margin-top:10px}
#roomcard .rc-clues div{font-size:12.5px;line-height:1.5;color:var(--under);padding:3px 0 3px 16px;position:relative}
#roomcard .rc-clues div::before{content:"◈";position:absolute;left:0;color:var(--brass-dim);font-size:10px;top:6px}
#roomcard .rc-foot{padding:9px 12px;border-top:1px solid var(--brass-faint);display:flex;gap:8px}
.rbtn{flex:1;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px;
  border:1px solid var(--brass-dim);border-radius:3px;color:var(--brass)}
.rbtn:hover{background:var(--brass);color:var(--ink)}
.rbtn.quiet{border-color:var(--brass-faint);color:var(--vellum-dim)}

/* tokens */
.toklist{display:flex;flex-direction:column;gap:4px}
.tok{display:flex;align-items:center;gap:9px;padding:6px 8px;border:1px solid transparent;border-radius:3px;cursor:pointer}
.tok:hover{border-color:var(--brass-faint);background:var(--felt-950)}
.tok.sel{border-color:var(--brass-dim);background:var(--felt-950)}
.tok .dot{width:15px;height:15px;border-radius:50%;flex:none;border:1.5px solid rgba(233,226,206,.55);
  display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;color:var(--ink)}
.tok .nm{flex:1;font-size:13px;color:var(--vellum);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tok .del{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--vellum-dim);padding:2px 5px;border-radius:3px}
.tok .del:hover{color:var(--oxblood);background:rgba(138,46,37,.15)}
.swatches{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.sw{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.sw.on{border-color:var(--vellum)}
#addtok-btn{width:100%}

/* status bar */
#status{position:fixed;left:0;right:0;bottom:0;height:26px;display:flex;align-items:center;gap:18px;
  padding:0 12px;background:var(--felt-900);border-top:1px solid var(--brass-faint);z-index:30;
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--vellum-dim)}
#status .spacer{flex:1}
#st-view{color:var(--brass)}

/* player-view masking */
body.playerview #roomcard .rc-dm,body.playerview #roomcard .rc-clues,
body.playerview .dm-only{display:none!important}

@media (prefers-reduced-motion: reduce){ :root{--shimmer:0} }
#tracker-float{position:fixed;left:calc(var(--rail-w) + 10px);top:calc(var(--top-h) + 10px);z-index:15;
  display:none;flex-direction:column;gap:2px;max-height:46vh;overflow-y:auto;pointer-events:none;
  background:rgba(14,20,17,.88);border:1px solid var(--brass-faint);border-radius:5px;padding:8px 11px;
  font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--vellum-dim)}
#tracker-float .tfh{font-size:9px;letter-spacing:.22em;color:var(--brass-dim);margin-bottom:3px}
#tracker-float .tfr{display:flex;gap:8px;white-space:nowrap}
#tracker-float .tfr.on{color:var(--brass)}
#tracker-float .tfr .n{min-width:22px;text-align:right}
body.netclient #tracker-float{left:10px}
#rolls-float{position:fixed;right:calc(var(--panel-w) + 14px);bottom:44px;z-index:28;width:256px;display:none;
  background:rgba(14,20,17,.95);border:1px solid var(--brass-dim);border-radius:6px;padding:10px 12px;
  box-shadow:0 8px 28px rgba(0,0,0,.55)}
#rolls-float .rfh{display:flex;align-items:center;gap:8px;cursor:grab;margin-bottom:8px;user-select:none;
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--brass)}
#rolls-float .rfh .x{margin-left:auto;cursor:pointer;color:var(--vellum-dim);padding:2px 6px}
#rolls-float .rfh .x:hover{color:var(--oxblood)}
body.netclient #rolls-float{right:12px;bottom:120px}
@media (max-width:760px){ body.netclient #rolls-float{left:8px;right:8px;width:auto} }
#net-banner{position:fixed;top:70px;left:50%;transform:translateX(-50%) scale(.8);opacity:0;pointer-events:none;
  text-align:center;transition:opacity .25s,transform .25s;z-index:40;text-shadow:0 2px 14px rgba(0,0,0,.9)}
#net-banner.show{opacity:1;transform:translateX(-50%) scale(1)}
#net-banner .rb-head{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.22em;color:var(--vellum-dim)}
#net-banner .rb-total{font-family:Marcellus,serif;font-size:72px;line-height:1;color:var(--vellum)}
#net-banner .rb-detail{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--under)}
body.netclient #rail,body.netclient .tabs,body.netclient .viewswitch,
body.netclient #btn-save,body.netclient #btn-load,body.netclient #btn-host,body.netclient #btn-pwin{display:none!important}
body.netclient #stage{left:0}
#fit-float,#panel-toggle{display:none;position:fixed;z-index:26;
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;padding:9px 14px;
  background:var(--felt-900);border:1px solid var(--brass-dim);border-radius:4px;color:var(--brass)}
#dicebar{display:none}
@media (max-width:760px){
  body.netclient #wordmark{font-size:15px}
  body.netclient #wordmark small{display:none}
  body.netclient #stage{right:0}
  body.netclient #dicebar{display:flex;position:fixed;left:0;right:0;bottom:26px;z-index:24;gap:4px;
    padding:7px 8px;background:var(--felt-900);border-top:1px solid var(--brass-faint)}
  body.netclient #dicebar button{flex:1;min-width:0;font-family:'IBM Plex Mono',monospace;font-size:10px;
    padding:9px 0;border:1px solid var(--brass-faint);border-radius:3px;color:var(--brass)}
  body.netclient #dicebar button:active{background:var(--brass);color:var(--ink)}
  body.netclient #panel{left:0;right:0;top:auto;bottom:71px;width:100%;max-height:46vh;
    border-left:none;border-top:1px solid var(--brass-dim);
    transform:translateY(calc(100% + 72px));transition:transform .22s ease;z-index:25}
  body.netclient.panelopen #panel{transform:none}
  body.netclient #panel-toggle{display:block;right:10px;bottom:81px}
  body.netclient #fit-float{display:block;left:10px;bottom:81px;border-color:var(--brass-faint);color:var(--vellum-dim)}
  body.netclient #st-hint{display:none}
}
#dmgate{position:fixed;inset:0;z-index:100;display:grid;place-items:center;background:#0A0F0C}
#dmgate .gcard{text-align:center;padding:36px 44px;border:1px solid var(--brass-faint);border-radius:6px;background:var(--felt-900)}
#dmgate h1{font-family:Marcellus,serif;font-size:26px;letter-spacing:.14em;color:var(--brass);margin-bottom:4px}
#dmgate .gsub{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.24em;color:var(--vellum-dim);margin-bottom:22px}
#dmgate input{width:220px;text-align:center;font-size:14px;padding:9px}
#dmgate .gbtn{display:block;margin:12px auto 0;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;
  padding:8px 22px;border:1px solid var(--brass-dim);border-radius:3px;color:var(--brass);cursor:pointer}
#dmgate .gbtn:hover{background:var(--brass);color:var(--ink)}
#dmgate .gerr{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--oxblood);height:14px;margin-top:10px}
#dmgate.shake .gcard{animation:gshake .3s}
@keyframes gshake{25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
</style>
</head>
<body>

<div id="dmgate">
  <div class="gcard">
    <h1>THE VERSO</h1>
    <div class="gsub">DM CONSOLE · LOCAL SCREEN LOCK</div>
    <input type="password" id="dmpass" placeholder="passphrase" autocomplete="off">
    <button class="gbtn" id="dmgo">ENTER</button>
    <div class="gerr" id="dmerr"></div>
  </div>
</div>
<header id="topbar">
  <div id="wordmark">THE VERSO<small>TABLE CONSOLE</small></div>
  <nav class="tabs">
    <button class="tab" id="tab-map">YOUR MAP</button>
    <button class="tab on" id="tab-verso">THE VERSO · BACK OF HOUSE</button>
    <button class="tab" id="tab-edit" title="Draw rooms on a top-down grid, write descriptions, save levels">EDITOR</button>
  </nav>
  <div class="spacer"></div>
  <div class="viewswitch" title="Player view hides DM notes, fog contents and unrevealed rooms">
    <button id="vw-dm" class="on">DM</button><button id="vw-pl">PLAYER</button>
  </div>
  <span id="net-status" style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--under);cursor:pointer;display:none" title="click to copy invite link"></span>
  <button class="tbtn" id="btn-host" title="Host an online table — players join with a code from their own devices">HOST TABLE</button>
  <button class="tbtn" id="btn-pwin" title="Open a separate live player-view window — share THAT window, keep this one private">PLAYER WINDOW ↗</button>
  <button class="tbtn" id="btn-save">SAVE</button>
  <button class="tbtn" id="btn-load">LOAD</button>
</header>

<aside id="rail">
  <button class="tool on" id="t-select" title="Select / move tokens · pan empty space  (V)">
    <svg viewBox="0 0 24 24"><path d="M6 3l12 9-5.5 1.2L10 19z"/></svg></button>
  <button class="tool" id="t-ruler" title="Ruler — drag to measure  (M)">
    <svg viewBox="0 0 24 24"><path d="M3 17L17 3l4 4L7 21zM8 16l1.5 1.5M11 13l1.5 1.5M14 10l1.5 1.5M17 7l1.5 1.5"/></svg></button>
  <div class="rail-rule"></div>
  <button class="tool" id="t-fogr" title="Reveal fog (uploaded map only)  (R)">
    <svg viewBox="0 0 24 24"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="2.6"/></svg></button>
  <button class="tool" id="t-fogh" title="Hide with fog (uploaded map only)  (H)">
    <svg viewBox="0 0 24 24"><path d="M4 4l16 16M2 12s3.5-6 10-6c1.6 0 3 .35 4.3.9M22 12s-3.5 6-10 6c-1.6 0-3-.35-4.3-.9"/></svg></button>
  <div class="rail-rule"></div>
  <button class="tool" id="t-fit" title="Fit scene to screen  (F)">
    <svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
</aside>

<main id="stage">
  <canvas id="cv"></canvas>
  <div id="dropzone">DROP MAP IMAGE</div>
</main>

<aside id="panel"></aside>

<div id="net-banner"></div>
<div id="tracker-float"></div>
<div id="rolls-float"></div>
<button id="fit-float">⤢ FIT</button>
<button id="panel-toggle">✕ CLOSE</button>
<div id="dicebar">
  <button data-bdie="4">d4</button><button data-bdie="6">d6</button><button data-bdie="8">d8</button>
  <button data-bdie="10">d10</button><button data-bdie="12">d12</button><button data-bdie="20">d20</button>
  <button data-bdie="100">d100</button><button data-bdie="adv">ADV</button><button data-bdie="dis">DIS</button>
</div>
<footer id="status">
  <span id="st-view">DM VIEW</span>
  <span id="st-hint">Drag tokens · drag space to pan · wheel to zoom</span>
  <span class="spacer"></span>
  <span id="st-pos"></span>
  <span id="st-zoom"></span>
</footer>

<input type="file" id="file-img" accept="image/*" hidden>
<input type="file" id="file-json" accept="application/json" hidden>
<input type="file" id="file-level" accept="application/json" hidden>
<input type="file" id="file-sheet" accept=".csv,text/csv" hidden>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<script src="app-core.js"></script>
<script>
"use strict";
const {escapeHTML:esc, parseDice, sanitizeSheet, spellAtkBonus, spellSaveDC, sanitizeLevelForClient, setBannerContent}=AppCore;
/* =====================================================================
   THE VERSO — single-file table console
   Scenes: "map" (uploaded image, square grid, fog of war)
           "verso" (built-in isometric Back of House)
   ===================================================================== */

const $ = id => document.getElementById(id);
const cv = $("cv");
let ctx = cv.getContext("2d");
let RVIEW = "dm";      // view used by the current render pass ("dm" | "pl")
let CAMOVR = null;     // camera override for the player-window render pass
const REDUCED = matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---------------- iso constants ---------------- */
const TW = 72, TH = 36;                 // iso tile screen size at zoom 1
const isoX = (i,j)=> (i-j)*TW/2;
const isoY = (i,j)=> (i+j)*TH/2;
const unIso = (x,y)=> [ (x/(TW/2)+y/(TH/2))/2, (y/(TH/2)-x/(TW/2))/2 ];

/* ---------------- the Verso floor plan (built-in level) ---------------- */
/* rect = tile coords {x,y,w,h}; corners run x..x+w, y..y+h */
const VERSO_ROOMS = [
 {id:"lift", name:"Freight Landing", sub:"scene of the crime",
  rect:{x:6,y:0,w:3,h:3}, floorA:"#3E424A", floorB:"#363A42", wall:"#5A5E66",
  read:"The freight doors hang wrenched off their track, one panel folded like a playing card. The lectern still stands beside them, its book open to pages that are now simply blank. The muzak plays on, unbothered. Somewhere down the corridor: footsteps on carpet. One set. Taking their time.",
  dm:"<b>ACT 1 RUNS HERE.</b> The Concierge arrives alone, notes the damage in a small pad, and delivers the bill speech: the account is matured; the lift goes DOWN or OUT freely, UP only after settlement; three ways to settle — <b>pay, win, or work</b> — at the Cage. He cannot lie about terms; anything else is 'above my floor, sir.' Key rule, stated in his voice when tested: <b>'Your magic can slam any door in this house. It can't unwrite a line. Effects, not records.'</b> One minute after he leaves, the patrols start (see Service Corridor).",
  clues:["The car panel now reads only: DOWN · OUT. The UP line is dark, labeled SETTLEMENT REQUIRED.",
         "The register is blank — their dispel erased it. The floor now reads the party as intruders, not guests.",
         "The TRANSIT tray fits the silver disc. Below it, much older: a slot shaped for a folded paper. A writ."]},
 {id:"white", name:"The White Room", sub:"where the elevator let him out",
  rect:{x:2,y:2,w:4,h:4}, floorA:"#D8D2C2", floorB:"#CCC5B2", wall:"#9C947E",
  read:"A room the color of nothing. No seams, no fixtures, no door — not on this side. Somewhere far off, a slot machine pays out; it sounds like applause.",
  dm:"<b>The door exists only when the house wants one.</b> It appears in whichever wall the Concierge is about to enter through. Trajan answers questions one beat too late, like a call on a bad line. If pressed (DC 13 Insight), his eyes flick toward the cloakroom wall before anyone knows the cloakroom exists.",
  clues:["Trajan's bootprints come IN through a solid wall. There are no prints of Randy's arrival at all.",
         "Trajan hums the muzak from the corridor — a song he hasn't heard yet.",

function loadLevel(lv){
  LEVEL.name=lv.name||"Untitled Level";
  LEVEL.bg=lv.bg||"#0A0F0C";
  LEVEL.roster=(lv.roster||PARTY).map(p=>{
    const q={...p};
    if(p.sheet) q.sheet=JSON.parse(JSON.stringify(p.sheet));   // sheets travel with the level
    return q;
  });
  LEVEL.props=(lv.props||[]).map(p=>({...p}));
  // rooms are unions of rectangles; older single-rect data migrates to rects:[rect]
  ROOMS=(lv.rooms||[]).map(r=>{
    const room={...r, clues:[...(r.clues||[])]};
    room.rects=(r.rects&&r.rects.length ? r.rects : [r.rect]).map(c=>({...c}));
    delete room.rect;
    return room;
  });
  DOORS=(lv.doors||[]).map(d=>({...d}));
  const ids=new Set(ROOMS.map(r=>r.id));
  for(const k of Object.keys(state.verso.revealed)) if(!ids.has(k)) delete state.verso.revealed[k];
  if(state.selRoom && !ids.has(state.selRoom)) state.selRoom=null;
  const tab=$("tab-verso"); if(tab) tab.textContent=LEVEL.name.toUpperCase();
  netMarkLevel(); netMark();
  renderPanel();
}

let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(devicePixelRatio||1,2);
  const r = $("stage").getBoundingClientRect();
  W=r.width; H=r.height;
  cv.width=W*DPR; cv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener("resize",()=>{
  const wasZero=!(W>0&&H>0);

  const c=cam();
  if((wasZero||!isFinite(c.s)||c.s<=0) && W>0 && H>0){fitScene();updZoom();} // recover from hidden-tab boot
});

/* ---------------- camera helpers ---------------- */
const toScreen=(wx,wy)=>{const c=cam();return [(wx-c.x)*c.s,(wy-c.y)*c.s];};
const toWorld =(sx,sy)=>{const c=cam();return [sx/c.s+c.x, sy/c.s+c.y];};
function zoomAt(sx,sy,f){
  const c=cam(); const [wx,wy]=toWorld(sx,sy);
  c.s=Math.min(6,Math.max(.12,c.s*f));
  c.x=wx-sx/c.s; c.y=wy-sy/c.s;
}
function fitScene(){
  if(!(W>0&&H>0)) return;   // stage not laid out yet (hidden tab) — a resize will refit
  const c=cam();
  if(state.scene==="map"){
    if(!state.map.img){c.x=-W/2;c.y=-H/2;c.s=1;return;}
    const iw=state.map.img.width, ih=state.map.img.height;
    c.s=Math.min(W/iw,H/ih)*.94;
    c.x=-(W/c.s-iw)/2; c.y=-(H/c.s-ih)/2;
  }else{
    // players only see revealed rooms — fit those, not the whole hidden floor plan
    let fitRooms=ROOMS;
    if(NET.mode==="client"){
      const rev=ROOMS.filter(r=>state.verso.revealed[r.id]);
      if(rev.length) fitRooms=rev;
    }
    let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
    for(const r of fitRooms) for(const rc of r.rects){
      const cs=[[rc.x,rc.y],[rc.x+rc.w,rc.y],[rc.x+rc.w,rc.y+rc.h],[rc.x,rc.y+rc.h]];
      for(const [i,j] of cs){minX=Math.min(minX,isoX(i,j));maxX=Math.max(maxX,isoX(i,j));minY=Math.min(minY,isoY(i,j));maxY=Math.max(maxY,isoY(i,j));}
    }
    const bw=maxX-minX, bh=maxY-minY+70;
    c.s=Math.min(W/bw,H/bh)*.9;
    c.x=minX-(W/c.s-bw)/2; c.y=minY-44-(H/c.s-bh)/2;
  }
}

/* ---------------- drawing: map scene ---------------- */
function drawMap(){
  const m=state.map, c=cam();
  ctx.save();
  ctx.scale(c.s,c.s); ctx.translate(-c.x,-c.y);
  if(m.img){
    ctx.drawImage(m.img,0,0);
    if(m.grid.show){
      ctx.strokeStyle="rgba(200,161,78,.22)";
      ctx.lineWidth=1/c.s;
      ctx.beginPath();
      const g=m.grid.size;
      for(let x=m.grid.ox%g; x<=m.img.width; x+=g){ctx.moveTo(x,0);ctx.lineTo(x,m.img.height);}
      for(let y=m.grid.oy%g; y<=m.img.height; y+=g){ctx.moveTo(0,y);ctx.lineTo(m.img.width,y);}
      ctx.stroke();
    }
    // tokens
    for(const t of m.tokens) drawTokenFlat(t,m.grid.size,c.s);
    // fog
    if(m.fog && m.fogOn){
      ctx.globalAlpha = RVIEW==="dm" ? .45 : 1;
      ctx.drawImage(m.fog,0,0);
      ctx.globalAlpha = 1;
    }
  }else{
    ctx.restore();
    emptyMapMessage();
    return;
  }
  drawPatrolPath();
  drawPings();
  ctx.restore();
}
function emptyMapMessage(){
  ctx.fillStyle="#0E1411"; ctx.fillRect(0,0,W,H);
  ctx.textAlign="center";
  ctx.fillStyle="#C8A14E"; ctx.font="22px Marcellus, serif";
  if(RVIEW==="pl"){
    ctx.fillText("THE TABLE IS BEING SET",W/2,H/2);
    return;
  }
  ctx.fillText("NO MAP ON THE TABLE",W/2,H/2-16);
  ctx.fillStyle="#ABA38C"; ctx.font="12px 'IBM Plex Mono', monospace";
  ctx.fillText("drop an image anywhere, or use IMPORT MAP in the panel →",W/2,H/2+12);
}
function drawTokenFlat(t,g,s){
  const r=g*.42*t.size;
  ctx.save();
  ctx.shadowColor="rgba(0,0,0,.55)"; ctx.shadowBlur=10/s; ctx.shadowOffsetY=3/s;
  ctx.beginPath(); ctx.arc(t.x,t.y,r,0,7); ctx.fillStyle=t.color; ctx.fill();
  ctx.shadowColor="transparent";
  ctx.lineWidth=Math.max(2,g*.05);
  ctx.strokeStyle = (RVIEW==="dm"&&state.selToken===t.id) ? "#E9E2CE" : "rgba(7,9,8,.6)";
  ctx.stroke();
  ctx.fillStyle="#070908"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.font=`600 ${r*.8}px 'IBM Plex Mono', monospace`;
  ctx.fillText(t.letter,t.x,t.y+r*.04);
  ctx.font=`500 ${Math.max(10,g*.2)}px 'IBM Plex Mono', monospace`;
  ctx.fillStyle="#E9E2CE";
  ctx.strokeStyle="rgba(7,9,8,.8)"; ctx.lineWidth=3; ctx.lineJoin="round";
  ctx.strokeText(t.name,t.x,t.y+r+g*.18);
  ctx.fillText(t.name,t.x,t.y+r+g*.18);
  ctx.restore();
}

/* ---------------- drawing: verso iso scene ---------------- */
let tNow=0;
function hash2(i,j){let h=(i*374761393+j*668265263)|0;h=(h^(h>>13))*1274126177;return ((h^(h>>16))>>>0)/4294967295;}
function tilePath(i,j){
  ctx.beginPath();
  tilePathAdd(i,j);
}
function tilePathAdd(i,j){ // append one tile to the current path (for multi-tile fills)
  ctx.moveTo(isoX(i,j),       isoY(i,j));
  ctx.lineTo(isoX(i+1,j),     isoY(i+1,j));
  ctx.lineTo(isoX(i+1,j+1),   isoY(i+1,j+1));
  ctx.lineTo(isoX(i,j+1),     isoY(i,j+1));
  ctx.closePath();
}
const GLYPHS="ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏᛒᛖᛗᛚᛜᛞᛟ";

/* ----- iso prop primitives ----- */
const P=(i,j)=>[isoX(i,j),isoY(i,j)];
function quad(a,b,c,d,fill,stroke){
  ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.lineTo(c[0],c[1]);ctx.lineTo(d[0],d[1]);ctx.closePath();
  ctx.fillStyle=fill;ctx.fill();
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=.7;ctx.stroke();}
}
const flat=(i0,j0,i1,j1,fill,stroke)=>quad(P(i0,j0),P(i1,j0),P(i1,j1),P(i0,j1),fill,stroke);
function shade(hex,f){ // f<1 darker, f>1 lighter
  const n=parseInt(hex.slice(1),16);
  const ch=s=>Math.max(0,Math.min(255,Math.round(s*f)));

function box(i0,j0,i1,j1,h,base){
  const A=P(i0,j0),B=P(i1,j0),C=P(i1,j1),D=P(i0,j1);
  const L=p=>[p[0],p[1]-h];
  quad(L(D),L(C),C,D,shade(base,.62));        // left-front face
  quad(L(B),L(C),C,B,shade(base,.8));         // right-front face
  quad(L(A),L(B),L(C),L(D),shade(base,1.18),"rgba(7,9,8,.45)"); // top
}
function wallPlate(i0,i1,j,h,base,glint){ // upright plate standing on a j-line
  const A=P(i0,j),B=P(i1,j),LA=[A[0],A[1]-h],LB=[B[0],B[1]-h];
  quad(LA,LB,B,A,base,"rgba(7,9,8,.5)");
  if(glint){
    const g=.16, A2=P(i0+g,j),B2=P(i1-g,j);
    quad([A2[0],A2[1]-h+4],[B2[0],B2[1]-h+4],[B2[0],B2[1]-4],[A2[0],A2[1]-4],glint);
  }
}
function lightPool(i,j,r,col){
  const [cx,cy]=P(i,j);
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  g.addColorStop(0,col);g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.save();ctx.translate(cx,cy);ctx.scale(1,.5);ctx.translate(-cx,-cy);
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.fill();ctx.restore();
}
function pole(i,j,h,w,base){
  const [x,y]=P(i,j);
  ctx.fillStyle=shade(base,.85);
  ctx.fillRect(x-w/2,y-h,w,h);
  ctx.beginPath();ctx.ellipse(x,y,w*1.4,w*.7,0,0,7);ctx.fillStyle="rgba(0,0,0,.4)";ctx.fill();
}

/* ----- second dressing pass: denser furniture ----- */
function cyl(i,j,r,h,base){
  const [x,y]=P(i,j);
  ctx.fillStyle=shade(base,.78); ctx.fillRect(x-r,y-h,r*2,h);
  ctx.beginPath();ctx.ellipse(x,y,r,r*.5,0,0,7);ctx.fillStyle=shade(base,.55);ctx.fill();
  ctx.beginPath();ctx.ellipse(x,y-h,r,r*.5,0,0,7);ctx.fillStyle=shade(base,1.2);ctx.fill();
  ctx.strokeStyle="rgba(7,9,8,.45)";ctx.lineWidth=.7;ctx.stroke();
}
function chipStack(i,j,base,n){
  const [x,y]=P(i,j), h=n*2.1, r=3.4;
  cyl(i,j,r,h,base);

  for(let k=1;k<n;k++){ctx.beginPath();ctx.moveTo(x-r,y-k*2.1);ctx.lineTo(x+r,y-k*2.1);ctx.stroke();}
}
function ropePosts(i1,j1,i2,j2){
  const A=P(i1,j1),B=P(i2,j2);
  cyl(i1,j1,2.2,24,"#8A6E36"); cyl(i2,j2,2.2,24,"#8A6E36");

function sconce(i,j,glow){

  // patrol that's since wandered off elsewhere doesn't broadcast its position
  let partyRoomIds=null;
  for(const t of toks){
    if(RVIEW!=="dm"){
      const room=roomAtTile(t.x,t.y);
      if(room && !v.revealed[room.id]) continue;
      if(room && !t.pc && !room.tokensAlways){
        if(!partyRoomIds){
          partyRoomIds=new Set();
          for(const p of v.tokens) if(p.pc){const pr=roomAtTile(p.x,p.y); if(pr) partyRoomIds.add(pr.id);}
        }

  ctx.restore();

function doorVisible(d){
  // visible to players if either adjoining room near the segment is revealed
  const probes = d.dir==="h"
    ? [[d.x+.5,d.y-.5],[d.x+.5,d.y+.5]]
    : [[d.x-.5,d.y+.5],[d.x+.5,d.y+.5]];
  return probes.some(([i,j])=>{const r=roomAtTile(i,j);return r && state.verso.revealed[r.id];});
}
function roomHasTile(r,i,j){return r.rects.some(rc=>i>=rc.x&&i<rc.x+rc.w&&j>=rc.y&&j<rc.y+rc.h);}
function roomAtTile(i,j){
  for(const r of ROOMS){ if(roomHasTile(r,i,j)) return r; }
  return null;
}
function roomTiles(r){ // union of the room's rects, deduped
  const seen=new Set(), out=[];
  for(const rc of r.rects) for(let i=rc.x;i<rc.x+rc.w;i++) for(let j=rc.y;j<rc.y+rc.h;j++){
    const k=i+","+j; if(!seen.has(k)){seen.add(k);out.push([i,j]);}
  }
  return out;
}
function roomEdges(r){ // outer boundary segments in tile-corner space
  const s=new Set(roomTiles(r).map(([i,j])=>i+","+j));
  const out=[];
  for(const key of s){
    const [i,j]=key.split(",").map(Number);
    if(!s.has(i+","+(j-1))) out.push([i,j,i+1,j]);
    if(!s.has(i+","+(j+1))) out.push([i,j+1,i+1,j+1]);
    if(!s.has((i-1)+","+j)) out.push([i,j,i,j+1]);
    if(!s.has((i+1)+","+j)) out.push([i+1,j,i+1,j+1]);
  }
  return out;
}
function roomBBox(r){
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for(const rc of r.rects){x0=Math.min(x0,rc.x);y0=Math.min(y0,rc.y);x1=Math.max(x1,rc.x+rc.w);y1=Math.max(y1,rc.y+rc.h);}
  return {x0,y0,x1,y1};
}
function drawTokenIso(t,s){

/* TURN relay — the deploy worker mints Cloudflare Realtime credentials at /turn.
   Remote players (cellular, different networks) usually can't connect peer-to-peer
   without a relay; the public free TURN servers are all dead. Where /turn isn't
   available (local file, worker not configured) we fall back to STUN only,
   which works on a shared LAN but usually not across the internet. */
let ICE=null;
const ICE_READY=Promise.race([
  (async()=>{
    try{
      const r=await fetch("turn",{cache:"no-store"});
      if(!r.ok) return;
      const d=await r.json();
      let s=d.iceServers;
      if(s&&!Array.isArray(s)) s=[s];
      if(Array.isArray(s)&&s.length) ICE=[{urls:"stun:stun.l.google.com:19302"},...s];
    }catch(e){}
  })(),
  new Promise(r=>setTimeout(r,4000))
]);
function peerOpts(){return ICE?{config:{iceServers:ICE,sdpSemantics:"unified-plan"}}:{};}

function moveAllowed(x,y){
  if(state.scene==="verso"){
    const r=roomAtTile(x,y);
    return !!(r && state.verso.revealed[r.id]);
  }
  const m=state.map;
  if(!m.img) return false;
  if(x<0||y<0||x>m.img.width||y>m.img.height) return false;
  if(!m.fog||!m.fogOn) return true;
  try{
    const px=m.fog.getContext("2d").getImageData(Math.floor(x),Math.floor(y),1,1).data;
    return px[3]<128; // blocked where fog is opaque
  }catch(e){return true;}
}

function clientToken(t){
  // NPC stat blocks (AC/HP/attacks/skills) are DM-only; patrol routes are always
  // DM staging info. Clone only when there's actually something to strip.
  if((!t.sheet||t.pc) && !t.patrol && t.pi==null) return t;
  const c={...t};
  if(!t.pc) delete c.sheet;
  delete c.patrol; delete c.pi;
  return c;
}

function startHost(){
  NET.code="verso-"+Math.random().toString(36).slice(2,7);

  NET.peer.on("open",()=>{
    NET.mode="host";

    el.style.display="inline";
    el.textContent="TABLE "+NET.code+" · 0 joined ⧉";
    el.onclick=()=>{if(navigator.clipboard)navigator.clipboard.writeText(inviteLink());el.textContent=el.textContent.replace("⧉","copied!");setTimeout(updNetStatus,1200);};
    $("btn-host").textContent="HOSTING";
  });
  NET.peer.on("connection",c=>{
    c.on("open",()=>{NET.conns.set(c.peer,c);updNetStatus();sendFullTo(c);});
    c.on("close",()=>{
      NET.conns.delete(c.peer);
      // release that player's claims
      for(const t of [...state.map.tokens,...state.verso.tokens]) if(t.owner===c.peer) delete t.owner;
      updNetStatus(); netMark(); renderPanel();
    });

      hostHandle(c,m);
    });
  });
  NET.peer.on("error",e=>{console.warn("peer error",e);$("net-status").textContent="TABLE ERROR — re-host";});
  NET.peer.on("disconnected",()=>{try{NET.peer.reconnect();}catch(e){}}); // signaling blip: rejoin the broker

  return base+"?join="+NET.code+"   (code: "+NET.code+")";

  const el=$("net-status");

function hostHandle(c,m){
  if(m.type==="claim"){
    const t=[...state.map.tokens,...state.verso.tokens].find(t=>t.id===m.id);
    if(!t || !t.pc) return;                                 // only designated player tokens
    if(t.owner && t.owner!==c.peer) return;                 // already someone else's
    for(const o of [...state.map.tokens,...state.verso.tokens]) if(o.owner===c.peer) delete o.owner;
    t.owner=c.peer; netMark(); renderPanel();
  }
  if(m.type==="move"){
    const t=S().tokens.find(t=>t.id===m.id);
    if(!t || t.owner!==c.peer) return;
    if(!moveAllowed(m.x,m.y)) return;                       // authority: reject illegal moves
    t.x=m.x; t.y=m.y; netMark();
  }
  if(m.type==="roll"){
    const label=m.label?String(m.label).slice(0,48):null;
    if(m.expr){
      const pd=parseDice(m.expr);
      if(pd) roll(pd.d,pd.n,pd.mod,"player",label);
      return;
    }
    const die=(m.die==="adv"||m.die==="dis")?m.die:+m.die;
    if(die!=="adv" && die!=="dis" && ![4,6,8,10,12,20,100].includes(die)) return;
    const mod=Math.max(-30,Math.min(30,(+m.mod||0)|0));
    const e=roll(die,1,mod,"player",label);
    if(m.init){
      const t=[...state.map.tokens,...state.verso.tokens].find(t=>t.owner===c.peer);
      trackerSet(t?t.name:(label||"Player"), e.total, t&&t.id);
    }
  }
  if(m.type==="sheet"){
    const t=[...state.map.tokens,...state.verso.tokens].find(t=>t.id===m.id);
    if(!t || t.owner!==c.peer) return;                      // players edit only their own
    const sh=sanitizeSheet(m.sheet);
    if(sh){t.sheet=sh; netMark(); renderPanel();}
  }
  if(m.type==="ping"){
    const wx=+m.x, wy=+m.y;
    if(!isFinite(wx)||!isFinite(wy)) return;
    const p={x:wx,y:wy,scene:state.scene,color:"#7FA8B8",stamp:String(m.stamp||Math.random())};
    addPing(p);
    netBroadcast({type:"ping",x:p.x,y:p.y,color:p.color,stamp:p.stamp});
  }
}
function pulsePatrols(){ // advance every patrolling token one waypoint
  let moved=0;
  for(const t of S().tokens){
    if(!t.patrol || !t.patrol.length) continue;
    t.pi=((t.pi==null?-1:t.pi)+1)%t.patrol.length;
    t.x=t.patrol[t.pi][0]; t.y=t.patrol[t.pi][1];
    moved++;
  }
  if(moved) markDirty();
  return moved;
}

let clientConn=null, clientDragging=false, cliOX=0, cliOY=0;
let cliWantTok=null, cliLastMsg=0, cliRetry=null, cliOpened=false, cliLevelFit=false;
function netStatus(t){const el=$("net-status");el.style.display="inline";el.textContent=t;}
function joinTable(code){
  if(typeof Peer==="undefined"){alert("Couldn't load the connection library — check your internet and reload.");return;}
  NET.mode="client"; NET.code=code.trim();
  document.body.classList.add("netclient");
  setDrawer(true);   // phones: start with the drawer up so players can claim a token
  setView("pl"); state.view="pl";
  resize(); fitScene(); updZoom();            // stage geometry changed with the netclient layout
  clientConnect(false);
  /* watchdog: the host heartbeats every 5s — silence means the channel died
     (locked phone, dropped Wi-Fi) even though PeerJS never fired close */
  setInterval(()=>{
    if(!cliOpened||!cliLastMsg) return;
    if(Date.now()-cliLastMsg>30000){cliLastMsg=Date.now();netStatus("CONNECTION LOST — RECONNECTING…");clientConnect(true);}
  },5000);
  document.addEventListener("visibilitychange",()=>{ // phone unlocked / back to Safari
    if(document.visibilityState!=="visible"||NET.mode!=="client") return;
    if(!clientConn||!clientConn.open){netStatus("RECONNECTING…");clientConnect(true);}
  });
}
function clientConnect(re){
  if(cliRetry){clearTimeout(cliRetry);cliRetry=null;}
  cliOpened=false;
  try{if(NET.peer)NET.peer.destroy();}catch(e){}
  clientConn=null;
  netStatus(re?"RECONNECTING…":"CONNECTING…");
  ICE_READY.then(()=>clientPeer());
}
function clientPeer(){
  const p=NET.peer=new Peer(peerOpts());
  p.on("open",id=>{
    NET.myId=id;
    const conn=clientConn=p.connect(NET.code,{reliable:true});
    conn.on("open",()=>{
      cliOpened=true; cliLastMsg=Date.now(); firstSync=true;
      netStatus("CONNECTED · "+NET.code);
      if(cliWantTok!=null) clientSend({type:"claim",id:cliWantTok}); // resume my token after a drop
    });
    conn.on("data",raw=>{
      cliLastMsg=Date.now();
      let m; try{m=JSON.parse(raw);}catch(e){return;}
      clientHandle(m);
    });
    conn.on("close",()=>{if(NET.peer===p){netStatus("CONNECTION LOST — RECONNECTING…");cliRescue();}});
    conn.on("error",()=>{if(NET.peer===p){netStatus("CONNECTION ERROR — RECONNECTING…");cliRescue();}});
  });
  p.on("disconnected",()=>{try{p.reconnect();}catch(e){}});
  p.on("error",e=>{
    if(NET.peer!==p) return;
    if(e.type==="peer-unavailable") netStatus("TABLE NOT FOUND — IS THE DM STILL HOSTING? RETRYING…");
    else netStatus("CONNECTION ERROR ("+(e.type||"?")+") — RETRYING…");
    cliRescue(e.type==="peer-unavailable"?8000:4000);
  });
  setTimeout(()=>{ // signaling worked but no P2P route
    if(!cliOpened && NET.mode==="client" && NET.peer===p){
      netStatus(ICE?"CAN'T REACH THE HOST — RETRYING…":"CAN'T REACH THE HOST (NO RELAY CONFIGURED) — RETRYING…");
      cliRescue();
    }
  },15000);
}
function cliRescue(delay){
  if(cliRetry) return;
  cliRetry=setTimeout(()=>{cliRetry=null;clientConnect(true);},delay||4000);
}
let firstSync=true;
function clientHandle(m){
  if(m.type==="sync"){
    if(m.scene!==state.scene){state.scene=m.scene; fitScene(); updZoom();}
    state.verso.revealed=m.revealed||{};
    Object.assign(state.map.grid,m.grid||{});
    state.map.fogOn=m.fogOn!==false;
    if(m.tracker) state.tracker=m.tracker;
    // apply tokens, but never overwrite the token I'm actively dragging
    const apply=(dst,src)=>{
      dst.length=0;
      for(const t of src) dst.push(t);
    };
    const mineNow=S().tokens.find(t=>t.id===NET.myToken);
    const keep=(clientDragging&&mineNow)?{...mineNow}:null;
    apply(state.map.tokens,m.tokens.map||[]);
    apply(state.verso.tokens,m.tokens.verso||[]);
    if(keep){
      const t=S().tokens.find(t=>t.id===keep.id);
      if(t){t.x=keep.x;t.y=keep.y;dragTok=t;}   // rebind the live drag to the fresh object
    }
    // verify my claim still holds
    if(NET.myToken!=null){
      const t=[...state.map.tokens,...state.verso.tokens].find(t=>t.id===NET.myToken);
      if(!t||t.owner!==NET.myId) NET.myToken=null;
    }
    // claim sent but not yet confirmed (or re-sent after a reconnect): adopt it once the host agrees
    if(NET.myToken==null && cliWantTok!=null){
      const t=[...state.map.tokens,...state.verso.tokens].find(t=>t.id===cliWantTok);
      if(t && t.owner===NET.myId) NET.myToken=cliWantTok;
    }
    if(m.dice && (!NET.lastDice||m.dice.stamp!==NET.lastDice.stamp)){NET.lastDice=m.dice;clientBanner(m.dice);}
    if(firstSync){firstSync=false;fitScene();updZoom();}
    renderPanel();
  }
  if(m.type==="level" && m.data){
    loadLevel(m.data);
    if(!cliLevelFit){cliLevelFit=true; if(state.scene==="verso"){fitScene();updZoom();}}
  }
  if(m.type==="ping" && !PINGS.some(q=>q.stamp===String(m.stamp))){
    const wx=+m.x, wy=+m.y;
    if(isFinite(wx)&&isFinite(wy))
      addPing({x:wx,y:wy,scene:state.scene,color:m.color||"#7FA8B8",stamp:String(m.stamp)});
  }
  if(m.type==="img"){
    const img=new Image();
    img.onload=()=>{state.map.img=img;state.map.imgURL=m.data;if(state.scene==="map")fitScene();};
    img.src=m.data;
  }
  if(m.type==="fog"){
    const fi=new Image();
    fi.onload=()=>{
      if(!state.map.fog||state.map.fog.width!==fi.width){
        const f=document.createElement("canvas");f.width=fi.width;f.height=fi.height;state.map.fog=f;
      }
      const fc=state.map.fog.getContext("2d");
      fc.clearRect(0,0,fi.width,fi.height);fc.drawImage(fi,0,0);
    };
    fi.src=m.data;
  }
}

function drawPatrolPath(){ // DM-only: dashed loop for the selected token's patrol
  if(RVIEW!=="dm" || NET.mode==="client") return;
  const t=S().tokens.find(t=>t.id===state.selToken);
  if(!t || !t.patrol || !t.patrol.length) return;
  const pts=t.patrol.map(([a,b])=> state.scene==="verso" ? [isoX(a,b),isoY(a,b)] : [a,b]);
  const c=cam();
  ctx.save();
  ctx.strokeStyle="#7FA8B8"; ctx.lineWidth=2/c.s; ctx.setLineDash([8/c.s,6/c.s]);
  ctx.beginPath();
  pts.forEach(([x,y],i)=> i?ctx.lineTo(x,y):ctx.moveTo(x,y));
  if(pts.length>2) ctx.closePath();
  ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle="#7FA8B8";
  pts.forEach(([x,y],i)=>{
    ctx.globalAlpha = i===((t.pi||0)%pts.length) ? 1 : .5;
    ctx.beginPath(); ctx.arc(x,y,4.5/c.s,0,7); ctx.fill();
  });
  ctx.restore();
}
function drawPings(){ // called inside each scene's world transform
  const now=performance.now(), c=cam();
  for(let i=PINGS.length-1;i>=0;i--){
    const p=PINGS[i], age=(now-p.t0)/1400;
    if(age>1){PINGS.splice(i,1);continue;}
    if(p.scene!==state.scene) continue;
    ctx.save();
    ctx.strokeStyle=p.color; ctx.lineWidth=3/c.s; ctx.globalAlpha=(1-age)*.9;
    ctx.beginPath(); ctx.arc(p.x,p.y,(10+age*70)/c.s,0,7); ctx.stroke();
    ctx.globalAlpha=(1-age)*.5;
    ctx.beginPath(); ctx.arc(p.x,p.y,(4+age*34)/c.s,0,7); ctx.stroke();
    ctx.restore();
  }
}

/* ---------------- dice ---------------- */
const SKILL_ABIL={"Acrobatics":"dex","Animal Handling":"wis","Arcana":"int","Athletics":"str",
  "Deception":"cha","History":"int","Insight":"wis","Intimidation":"cha","Investigation":"int",
  "Medicine":"wis","Nature":"int","Perception":"wis","Performance":"cha","Persuasion":"cha",
  "Religion":"int","Sleight of Hand":"dex","Stealth":"dex","Survival":"wis"};
function initOf(sh){return sh.init==null ? (sh.abil.dex||0) : sh.init;} // blank init = DEX (5e default)
function skillBonus(sh,name){
  if(sh.skills && name in sh.skills) return sh.skills[name];
  const sv=/^(\w{3}) save$/i.exec(name);
  if(sv) return sh.abil[sv[1].toLowerCase()]||0;
  const ab=SKILL_ABIL[name];
  return ab ? (sh.abil[ab]||0) : 0;
}
/* ---------------- gsheet character import ----------------
   Reads the CSV export of the popular "v2.1" 5e Google Sheet template.
   Label-anchored, so it tolerates the row drift between characters. */
function parseCSV(text){
  const rows=[[]]; let cell="", q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(q){
      if(ch==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else q=false; }
      else cell+=ch;
    }else if(ch==='"') q=true;
    else if(ch===","){rows[rows.length-1].push(cell);cell="";}
    else if(ch==="\n"){rows[rows.length-1].push(cell);cell="";rows.push([]);}
    else if(ch!=="\r") cell+=ch;
  }
  rows[rows.length-1].push(cell);
  return rows;
}
function importGSheetCSV(text){
  const rows=parseCSV(text);
  const cell=(r,c)=>((rows[r]||[])[c]||"").trim();
  const isNum=v=>/^[+-]?\d+$/.test(v);
  const find=label=>{
    for(let r=0;r<rows.length;r++) for(let c=0;c<(rows[r]||[]).length;c++)
      if(cell(r,c)===label) return [r,c];
    return null;
  };
  const out={abil:{},skills:{},atks:[]};
  let hits=0, p;
  if((p=find("CLASS(ES) & LEVEL(S)"))){out.name=cell(p[0],2); hits++;}
  if((p=find("PROFICIENCY BONUS"))){
    for(let c=0;c<p[1];c++) if(isNum(cell(p[0],c))){out.prof=+cell(p[0],c);hits++;break;}
  }
  if((p=find("INIT")) && isNum(cell(p[0]-2,p[1]))){out.init=+cell(p[0]-2,p[1]);hits++;}
  if((p=find("AC")) && isNum(cell(p[0]-2,p[1]))){out.ac=+cell(p[0]-2,p[1]);hits++;}
  if((p=find("Hit Point Max")) && isNum(cell(p[0],p[1]+3))){out.hpMax=+cell(p[0],p[1]+3);hits++;}
  if((p=find("CURRENT HIT POINTS"))){
    const v=cell(p[0]+2,p[1]);
    // sheets commonly leave this cell at 0 for an undamaged character (relying on
    // a formula elsewhere) — importing that literally would show a fresh PC as dying,
    // so only trust it when it's a positive number; otherwise fall back to max HP
    if(isNum(v) && +v>0){out.hp=+v;hits++;}
  }
  if((p=find("ABILITY"))){
    // the SPELLCASTING block's ability name (e.g. "Wisdom") sits 2 rows above its
    // own label, same as INIT/AC — attack bonus & save DC are derived from this,
    // not imported directly, so they stay correct if prof/mods change later
    const SPELL_ABIL={Strength:"str",Dexterity:"dex",Constitution:"con",Intelligence:"int",Wisdom:"wis",Charisma:"cha"};
    const full=cell(p[0]-2,p[1]);
    if(SPELL_ABIL[full]){out.spellAbil=SPELL_ABIL[full]; hits++;}
  }
  for(const ab of ["STR","DEX","CON","INT","WIS","CHA"]){
    for(let r=0;r<rows.length;r++){
      if(cell(r,2)!==ab) continue;
      for(let rr=r+1;rr<=r+3;rr++) if(isNum(cell(rr,2))){out.abil[ab.toLowerCase()]=+cell(rr,2);hits++;break;}
      break;
    }
  }
  const SAVES={Strength:"STR",Dexterity:"DEX",Constitution:"CON",Intelligence:"INT",Wisdom:"WIS",Charisma:"CHA"};
  for(let r=0;r<rows.length;r++){
    const n=cell(r,9), b=cell(r,8);
    if(!isNum(b)) continue;
    if(n in SKILL_ABIL){out.skills[n]=+b;hits++;}
    else if(n in SAVES) out.skills[SAVES[n]+" save"]=+b;
  }
  if((p=find("ATK BONUS"))){
    const [r0,cAtk]=p;
    const row0=rows[r0]||[];
    const cName=row0.findIndex(v=>v.trim()==="NAME"), cDmg=row0.findIndex(v=>v.trim()==="DAMAGE/TYPE");
    const near=(r,c0,test)=>{
      for(let c=c0-1;c<=c0+1;c++){const v=cell(r,c); if(v&&test(v)) return v;}
      return null;
    };
    for(let r=r0+1;r<=r0+8 && cName>=0;r++){
      const name=near(r,cName,v=>v!=="-");
      const atk=near(r,cAtk,isNum);
      const dmgraw=near(r,cDmg,v=>/\d*d\d+/.test(v));
      if(!name||!atk||!dmgraw) continue;
      const m=/(\d*)d(\d+)\s*\+?\s*(-?\d+)?/.exec(dmgraw);
      out.atks.push({name:name.slice(0,24), hit:+atk,
        dmg:(m[1]||"1")+"d"+m[2]+(m[3]?((+m[3]>=0?"+":"")+m[3]):"")});
      hits++;
    }
  }
  return hits>=6 ? out : null;   // too few anchors = not this template
}
function fillSheetForm(s){ // populate the open form for review; user still hits SAVE
  const sign=v=>(v>=0?"+":"")+v;
  if("prof" in s) $("sh-prof").value=s.prof;
  if("init" in s) $("sh-init").value=s.init;
  if("ac" in s) $("sh-ac").value=s.ac;
  if("hpMax" in s) $("sh-hpmax").value=s.hpMax;
  if("hp" in s) $("sh-hp").value=s.hp;
  if("spellAbil" in s) $("sh-spellabil").value=s.spellAbil||"";
  for(const k of ["str","dex","con","int","wis","cha"]) if(k in s.abil) $("sh-"+k).value=s.abil[k];
  if(s.atks.length) $("sh-atks").value=s.atks.map(a=>a.name+" "+sign(a.hit)+" "+a.dmg).join("\n");
  const sk=Object.entries(s.skills);
  if(sk.length) $("sh-skills").value=sk.map(([k,v])=>k+" "+sign(v)).join("\n");
}
$("file-sheet").onchange=e=>{
  const f=e.target.files[0]; e.target.value="";
  if(!f || !$("sh-prof")) return;

    fillSheetForm(s);
  };
  rd.readAsText(f);
};
let diceLog=[], diceN=1, diceMod=0, bannerTimer=null, dmHidden=false;
function roll(d,n,mod,who,label){
  n=Math.max(1,Math.min(10,n|0)); mod=mod|0;
  let results=[],mode=null;
  if(d==="adv"||d==="dis"){
    mode=d; d=20;
    const a=1+Math.floor(Math.random()*20), b=1+Math.floor(Math.random()*20);
    results=[a,b];
    var kept = mode==="adv" ? Math.max(a,b) : Math.min(a,b);
    var total = kept+mod;
  }else{
    for(let k=0;k<n;k++) results.push(1+Math.floor(Math.random()*d));
    var kept=null;
    var total=results.reduce((a,b)=>a+b,0)+mod;
  }
  const hush = who==="dm" && dmHidden;   // hidden DM roll: log only, no banners, nothing broadcast
  const entry={d,n:mode?2:n,mod,results,kept,mode,total,who,label:label||null,hush,at:Date.now()};
  diceLog.unshift(entry); diceLog=diceLog.slice(0,10);
  if(!hush){
    NET.lastDice=Object.assign(fmtRoll(entry),{stamp:++NET.diceStamp});
    netMark();
  }
  renderPanel();
  if(!hush){
    pushRollBanner(entry);
    if(NET.mode!=="client") clientBanner(NET.lastDice);
  }
  return entry;
}
function fmtRoll(e){
  const die=(e.mode? "d20 "+e.mode.toUpperCase() : e.n+"d"+e.d);
  const mod=e.mod? (e.mod>0?" +"+e.mod:" "+e.mod) : "";
  return {head:(e.label? e.label+" · " : "")+die+mod, total:e.total,
    detail:"["+e.results.join(", ")+"]"+(e.kept!=null?" → keep "+e.kept:"")+(e.mod?" "+(e.mod>0?"+":"")+e.mod:"")};
}

function pushRollBanner(e){

  const fumble=(e.d===20 && (e.kept!=null?e.kept:e.results[0]))===1 && e.n<=2;

}

function tokenAt(sx,sy){
  const [wx,wy]=toWorld(sx,sy);
  if(state.scene==="map"){
    const g=state.map.grid.size;
    for(let k=state.map.tokens.length-1;k>=0;k--){
      const t=state.map.tokens[k];
      if(Math.hypot(wx-t.x,wy-t.y)<=g*.45*t.size) return t;
    }
  }else{
    const [i,j]=unIso(wx,wy);
    // a player can only ever move their own claimed token — if it's anywhere under
    // the tap, grab it outright rather than losing to whatever else is on that tile
    if(NET.mode==="client" && NET.myToken!=null){
      const mine=state.verso.tokens.find(t=>t.id===NET.myToken);
      if(mine && Math.hypot(i-mine.x,j-mine.y)<.75*mine.size) return mine;
    }
    // otherwise prefer whichever token is drawn on top, so an exact tile-stack
    // (e.g. an NPC standing where a PC snapped to) resolves to what's visible
    const byTop=[...state.verso.tokens].sort((a,b)=>(b.x+b.y)-(a.x+a.y));
    let best=null,bd=1e9;
    for(const t of byTop){
      const d=Math.hypot(i-t.x,j-t.y);
      if(d<.75*t.size && d<bd){best=t;bd=d;}
    }
    return best;
  }
  return null;
}
function paintFog(sx,sy){
  const m=state.map; if(!m.img||!m.fog) return;
  const [wx,wy]=toWorld(sx,sy);
  const fctx=m.fog.getContext("2d");
  fctx.save();
  fctx.globalCompositeOperation = state.tool==="fogr" ? "destination-out" : "source-over";
  fctx.fillStyle="#04130C";
  fctx.beginPath(); fctx.arc(wx,wy,m.brush,0,7); fctx.fill();
  fctx.restore();
  markDirty(); netMarkFog();
}

cv.addEventListener("pointerdown",e=>{
  try{cv.setPointerCapture(e.pointerId);}catch(_){/* pointer already gone */}
  pointers.set(e.pointerId,{x:e.offsetX,y:e.offsetY});
  if(pointers.size===2){
    const [a,b]=[...pointers.values()];
    pinchRef={d:Math.hypot(a.x-b.x,a.y-b.y)};
    dragTok=null; panRef=null; edDraft=null; edDrag=null; return;
  }
  if(state.mode==="edit"){edDown(e);return;}
  // patrol recording: DM clicks drop waypoints for the selected token
  if(patrolRec!=null && NET.mode!=="client" && e.button===0 && !spaceDown){
    const t=S().tokens.find(t=>t.id===patrolRec);
    if(t){
      const [pwx,pwy]=toWorld(e.offsetX,e.offsetY);
      let pt;
      if(state.scene==="verso"){
        const [i,j]=unIso(pwx,pwy);
        pt=[Math.floor(i)+.5,Math.floor(j)+.5];
      }else{
        pt=[pwx,pwy];
        const g=state.map.grid;
        if(g.snap&&g.show) pt=[Math.floor((pwx-g.ox)/g.size)*g.size+g.ox+g.size/2,
                               Math.floor((pwy-g.oy)/g.size)*g.size+g.oy+g.size/2];
      }
      t.patrol=t.patrol||[];
      t.patrol.push(pt);
      markDirty(); renderPanel();
    }
    return;
  }
  // double-tap / double-click pings the spot for everyone at the table
  if(e.button===0 && !spaceDown){
    const now=performance.now();
    if(lastTap && now-lastTap.t<400 && Math.hypot(e.offsetX-lastTap.x,e.offsetY-lastTap.y)<24){
      const [pwx,pwy]=toWorld(e.offsetX,e.offsetY);
      spawnPing(pwx,pwy);
      lastTap=null;
      downAt=null;
      return;   // the second tap pings; don't also grab a token or start a pan
    }else lastTap={t:now,x:e.offsetX,y:e.offsetY};
  }
  downAt={x:e.offsetX,y:e.offsetY,moved:false};
  if(NET.mode==="client"){
    if(e.button===2){downAt=null;return;}
    const wantPanC = spaceDown || e.button===1;
    if(!wantPanC && state.tool!=="ruler"){
      const t=tokenAt(e.offsetX,e.offsetY);
      if(t && t.id===NET.myToken){
        dragTok=t; clientDragging=true;
        cliOX=t.x; cliOY=t.y;
        state.selToken=t.id; return;
      }
    }
    if(state.tool==="ruler" && !wantPanC){
      const [wx,wy]=toWorld(e.offsetX,e.offsetY);
      ruler={x1:wx,y1:wy,x2:wx,y2:wy}; return;
    }
    panRef={x:e.offsetX,y:e.offsetY,cx:cam().x,cy:cam().y};

  }

    const t=tokenAt(e.offsetX,e.offsetY);
    if(t && confirm('Remove token "'+t.name+'"?')){
      const arr=S().tokens, i=arr.indexOf(t);
      if(i>=0) arr.splice(i,1);

      markDirty(); renderPanel(); downAt=null; return;
    }
  }
  const wantPan = spaceDown || e.button===1 || e.button===2;
  if(state.tool==="ruler" && !wantPan){
    const [wx,wy]=toWorld(e.offsetX,e.offsetY);
    ruler={x1:wx,y1:wy,x2:wx,y2:wy};
    return;
  }
  if((state.tool==="fogr"||state.tool==="fogh") && state.scene==="map" && !wantPan){
    fogPainting=true; paintFog(e.offsetX,e.offsetY); return;
  }
  if(!wantPan){
    const t=tokenAt(e.offsetX,e.offsetY);
    if(t){dragTok=t; state.selToken=t.id; renderPanel(); return;}
  }
  panRef={x:e.offsetX,y:e.offsetY,cx:cam().x,cy:cam().y};
});

cv.addEventListener("wheel",e=>{
  e.preventDefault();
  const dm=e.deltaMode===1?33:e.deltaMode===2?H:1;   // lines/pages -> px
  if(e.ctrlKey||e.metaKey){
    // trackpad pinch (macOS reports it as ctrl+wheel) & ctrl/cmd+scroll:
    // zoom proportional to the gesture instead of fixed 12% steps
    zoomAt(e.offsetX,e.offsetY,Math.exp(-e.deltaY*dm*.0018));
    updZoom(); return;
  }
  if(state.mode==="edit"){
    // editor: two-finger scroll pans, so DRAW mode never needs a tool switch
    const c=cam();
    c.x+=e.deltaX*dm/c.s; c.y+=e.deltaY*dm/c.s;
    return;
  }
  zoomAt(e.offsetX,e.offsetY,Math.exp(-e.deltaY*dm*.0018));
  updZoom();
},{passive:false});

/* ---------------- level editor (top-down) ----------------
   Rooms are drawn on a flat tile grid; play mode renders the same data iso. */
const ET=34;                                  // editor px per tile at zoom 1
const edCam={x:-120,y:-120,s:1};
let edTool="draw", edSel=null, edDraft=null, edDrag=null, edHover=null, edTemplate=0, edFitDone=false, edRoomN=0, edPropType="table", edRosterSel=null;
const edTile=(sx,sy)=>{const [wx,wy]=toWorld(sx,sy);return [wx/ET,wy/ET];};
function levelTouched(){markDirty(); netMarkLevel();}
function newRoomId(){let id; do{id="room"+(++edRoomN);}while(ROOMS.some(r=>r.id===id)); return id;}
/* undo: whole-level snapshots taken just before each editor mutation */
const edUndoStack=[];
function edSnapshot(){
  edUndoStack.push(JSON.stringify(levelData()));
  if(edUndoStack.length>60) edUndoStack.shift();
}
function edUndoPop(){
  if(!edUndoStack.length) return;
  loadLevel(JSON.parse(edUndoStack.pop()));
  edSel=null; edDraft=null; edDrag=null;
  markDirty(); renderPanel();
}
const rcOverlap=(a,b)=>!(a.x+a.w<=b.x||b.x+b.w<=a.x||a.y+a.h<=b.y||b.y+b.h<=a.y);
function overlapsOtherRooms(rects,excludeId){
  return ROOMS.some(o=>o.id!==excludeId && o.rects.some(orc=>rects.some(rc=>rcOverlap(rc,orc))));
}
function rectTouchesRoom(rc,r){ // shares an edge with (or overlaps) the room — keeps rooms contiguous
  const s=new Set(roomTiles(r).map(([i,j])=>i+","+j));
  for(let i=rc.x;i<rc.x+rc.w;i++)for(let j=rc.y;j<rc.y+rc.h;j++){
    if(s.has(i+","+j)||s.has((i+1)+","+j)||s.has((i-1)+","+j)||s.has(i+","+(j+1))||s.has(i+","+(j-1))) return true;
  }
  return false;
}
function pruneDoors(){ // drop doors left stranded when rooms move or die
  DOORS=DOORS.filter(d=>{
    const probes=d.dir==="h"?[[d.x+.5,d.y-.5],[d.x+.5,d.y+.5]]:[[d.x-.5,d.y+.5],[d.x+.5,d.y+.5]];
    return probes.some(([i,j])=>roomAtTile(i,j));
  });
}
function draftRect(){
  const a={i:Math.floor(edDraft.ai),j:Math.floor(edDraft.aj)};
  const b={i:Math.floor(edDraft.bi),j:Math.floor(edDraft.bj)};
  return {x:Math.min(a.i,b.i), y:Math.min(a.j,b.j), w:Math.abs(b.i-a.i)+1, h:Math.abs(b.j-a.j)+1};
}
function edFit(){
  if(!(W>0&&H>0)) return;
  let minX=0,minY=0,maxX=24,maxY=18;
  if(ROOMS.length){
    minX=1e9;minY=1e9;maxX=-1e9;maxY=-1e9;
    for(const r of ROOMS){
      const bb=roomBBox(r);
      minX=Math.min(minX,bb.x0); minY=Math.min(minY,bb.y0);
      maxX=Math.max(maxX,bb.x1); maxY=Math.max(maxY,bb.y1);
    }
  }
  const bw=(maxX-minX+4)*ET, bh=(maxY-minY+4)*ET;
  edCam.s=Math.min(W/bw,H/bh);
  edCam.x=(minX-2)*ET-(W/edCam.s-bw)/2;
  edCam.y=(minY-2)*ET-(H/edCam.s-bh)/2;
  updZoom();
}
function drawEditor(){
  const c=edCam;
  ctx.fillStyle="#0C1310"; ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.scale(c.s,c.s); ctx.translate(-c.x,-c.y);
  const i0=Math.floor(c.x/ET)-1, i1=Math.ceil((c.x+W/c.s)/ET)+1;
  const j0=Math.floor(c.y/ET)-1, j1=Math.ceil((c.y+H/c.s)/ET)+1;
  ctx.lineWidth=1/c.s; ctx.strokeStyle="rgba(200,161,78,.09)";
  ctx.beginPath();
  for(let i=i0;i<=i1;i++){ctx.moveTo(i*ET,j0*ET);ctx.lineTo(i*ET,j1*ET);}
  for(let j=j0;j<=j1;j++){ctx.moveTo(i0*ET,j*ET);ctx.lineTo(i1*ET,j*ET);}
  ctx.stroke();
  // origin cross
  ctx.strokeStyle="rgba(200,161,78,.3)";
  ctx.beginPath();ctx.moveTo(-6,0);ctx.lineTo(6,0);ctx.moveTo(0,-6);ctx.lineTo(0,6);ctx.stroke();
  // rooms (unions of rects, boundary-stroked)
  for(const r of ROOMS){
    const rev=!!state.verso.revealed[r.id];
    ctx.fillStyle=r.floorA; ctx.globalAlpha=.92;
    for(const rc of r.rects) ctx.fillRect(rc.x*ET,rc.y*ET,rc.w*ET,rc.h*ET);
    ctx.globalAlpha=1;
    ctx.beginPath();
    for(const [x1,y1,x2,y2] of roomEdges(r)){ctx.moveTo(x1*ET,y1*ET);ctx.lineTo(x2*ET,y2*ET);}
    ctx.lineWidth=(r.id===edSel?3:2)/c.s;
    ctx.strokeStyle=r.id===edSel?"#E9E2CE":r.wall;
    ctx.stroke();
    const bb=roomBBox(r);
    ctx.font="600 10px 'IBM Plex Mono', monospace";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillStyle="rgba(7,9,8,.85)";
    ctx.fillText(r.name.toUpperCase()+(rev?"":" ○"),(bb.x0+bb.x1)/2*ET,(bb.y0+bb.y1)/2*ET);
  }
  // doors / openings (line widths in screen px so they stay clickable targets at any zoom)
  for(const d of DOORS){
    const len=d.len||1;
    const x2=d.dir==="h"?d.x+len:d.x, y2=d.dir==="h"?d.y:d.y+len;
    ctx.beginPath();
    ctx.moveTo(d.x*ET,d.y*ET); ctx.lineTo(x2*ET,y2*ET);
    if(d.type==="open"){ctx.strokeStyle="#2B2125";ctx.lineWidth=7/c.s;}
    else{ctx.strokeStyle="#C8A14E";ctx.lineWidth=4/c.s;ctx.setLineDash([6/c.s,4/c.s]);}
    ctx.stroke(); ctx.setLineDash([]);
  }
  // door tool: highlight the edge a click would toggle
  if(edTool==="door" && edHover){
    const hx2=edHover.dir==="h"?edHover.x+1:edHover.x, hy2=edHover.dir==="h"?edHover.y:edHover.y+1;
    const existing=DOORS.find(o=>o.x===edHover.x&&o.y===edHover.y&&o.dir===edHover.dir);
    ctx.beginPath();
    ctx.moveTo(edHover.x*ET,edHover.y*ET); ctx.lineTo(hx2*ET,hy2*ET);
    ctx.strokeStyle=existing?"#8A2E25":"#E9E2CE";
    ctx.lineWidth=6/c.s; ctx.globalAlpha=.85; ctx.stroke(); ctx.globalAlpha=1;
  }
  // furniture glyphs
  ctx.font="600 9px 'IBM Plex Mono', monospace";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  for(const pr of (LEVEL.props||[])){
    ctx.fillStyle="rgba(200,161,78,.75)";
    ctx.fillRect((pr.x+.2)*ET,(pr.y+.2)*ET,ET*.6,ET*.6);
    ctx.fillStyle="#070908";
    ctx.fillText(PROP_LIB[pr.t]?PROP_LIB[pr.t].n[0]:"?",(pr.x+.5)*ET,(pr.y+.55)*ET);
  }
  // draft rect
  if(edDraft){
    const rc=draftRect();
    ctx.fillStyle="rgba(200,161,78,.2)";
    ctx.fillRect(rc.x*ET,rc.y*ET,rc.w*ET,rc.h*ET);
    ctx.strokeStyle="#C8A14E"; ctx.lineWidth=2/c.s; ctx.setLineDash([6/c.s,4/c.s]);
    ctx.strokeRect(rc.x*ET,rc.y*ET,rc.w*ET,rc.h*ET); ctx.setLineDash([]);
  }
  // resize handles: one per rect of the selected room
  const sr=ROOMS.find(r=>r.id===edSel);
  if(sr){
    const hs=9/c.s;
    ctx.fillStyle="#E9E2CE";
    for(const rc of sr.rects){
      ctx.fillRect((rc.x+rc.w)*ET-hs/2,(rc.y+rc.h)*ET-hs/2,hs,hs);
    }
  }
  // token ghosts for reference
  for(const t of state.verso.tokens){
    ctx.globalAlpha=.55;
    ctx.beginPath(); ctx.arc(t.x*ET,t.y*ET,6/Math.max(c.s,.5),0,7);
    ctx.fillStyle=t.color; ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.restore();
}
function edDown(e){
  const [fi,fj]=edTile(e.offsetX,e.offsetY);
  if(edTool==="door" && e.button===2){edRemoveDoor(fi,fj);return;}
  if(edTool==="prop" && e.button===2){edProp(fi,fj,true);return;}
  if(e.button===1 || e.button===2 || spaceDown){
    panRef={x:e.offsetX,y:e.offsetY,cx:cam().x,cy:cam().y};
    return;
  }
  if(edTool==="door"){edToggleDoor(fi,fj);return;}
  if(edTool==="prop"){edProp(fi,fj,false);return;}
  // resize handles of current selection: one per rect (both draw & select tools)
  const sr=ROOMS.find(r=>r.id===edSel);
  if(sr){
    const lim=Math.min(14, ET*edCam.s*.75);   // don't let handles eat room-drags when zoomed out
    for(let ri=0;ri<sr.rects.length;ri++){
      const rc=sr.rects[ri];
      const [sx,sy]=toScreen((rc.x+rc.w)*ET,(rc.y+rc.h)*ET);
      if(Math.hypot(e.offsetX-sx,e.offsetY-sy)<lim){
        edSnapshot();
        edDrag={mode:"resize",room:sr,ri,orig:sr.rects.map(c=>({...c}))};
        return;
      }
    }
  }
  const r=roomAtTile(fi,fj);
  // alt/option-click a section of the selected room removes that rect
  if(e.altKey && r && sr && r===sr && sr.rects.length>1){
    const ri=sr.rects.findIndex(rc=>fi>=rc.x&&fi<rc.x+rc.w&&fj>=rc.y&&fj<rc.y+rc.h);
    if(ri>=0){edSnapshot(); sr.rects.splice(ri,1); pruneDoors(); levelTouched();}
    return;
  }
  if(r){
    edSel=r.id;
    edSnapshot();
    edDrag={mode:"move",room:r,fi,fj,orig:r.rects.map(c=>({...c}))};
    renderPanel();
    return;
  }
  if(edTool==="draw"){
    // shift+drag on empty grid extends the selected room (L-shapes etc.)
    edDraft={ai:fi,aj:fj,bi:fi,bj:fj,sx:e.offsetX,sy:e.offsetY,moved:false,
             addTo:(e.shiftKey&&sr)?sr.id:null};
    return;
  }
  if(edSel){edSel=null;renderPanel();}
  panRef={x:e.offsetX,y:e.offsetY,cx:cam().x,cy:cam().y};
}
function edMove(e){
  const [fi,fj]=edTile(e.offsetX,e.offsetY);
  $("st-pos").textContent=`tile ${Math.floor(fi)}, ${Math.floor(fj)}`;
  edHover = edTool==="door" ? edNearestEdge(fi,fj) : null;
  if(!e.buttons) return;
  if(edDraft){
    if(Math.hypot(e.offsetX-edDraft.sx,e.offsetY-edDraft.sy)>4) edDraft.moved=true;
    edDraft.bi=fi; edDraft.bj=fj;
    return;
  }
  if(edDrag){
    const r=edDrag.room;
    if(edDrag.mode==="move"){
      const di=Math.round(fi-edDrag.fi), dj=Math.round(fj-edDrag.fj);
      r.rects=edDrag.orig.map(c=>({x:c.x+di,y:c.y+dj,w:c.w,h:c.h}));
    }else{
      const rc=r.rects[edDrag.ri];
      rc.w=Math.max(1,Math.round(fi)-rc.x);
      rc.h=Math.max(1,Math.round(fj)-rc.y);
    }
    return;
  }
  if(panRef){
    const c=cam();
    c.x=panRef.cx-(e.offsetX-panRef.x)/c.s;
    c.y=panRef.cy-(e.offsetY-panRef.y)/c.s;
  }
}
function edUp(){
  if(edDraft){
    if(!edDraft.moved){ // a plain click isn't a room — deselect instead
      edDraft=null;
      if(edSel){edSel=null;renderPanel();}
      return;
    }
    const rc=draftRect(), addTo=edDraft.addTo;
    edDraft=null;
    if(addTo){
      const room=ROOMS.find(r=>r.id===addTo);
      if(room && !overlapsOtherRooms([rc],room.id) && rectTouchesRoom(rc,room)){
        edSnapshot(); room.rects.push(rc); levelTouched();
      }
    }else if(!overlapsOtherRooms([rc],null)){
      edSnapshot();
      const t=TEMPLATES[edTemplate];
      const room={id:newRoomId(), name:"New Room", sub:"", rects:[rc],
        floorA:t.floorA, floorB:t.floorB, wall:t.wall, read:"", dm:"", clues:[]};
      if(t.corridor) room.corridor=true;
      ROOMS.push(room); edSel=room.id;
      levelTouched();
    }
    renderPanel();
    return;
  }
  if(edDrag){
    const r=edDrag.room;
    if(overlapsOtherRooms(r.rects,r.id)) r.rects=edDrag.orig;   // no overlapping rooms
    if(JSON.stringify(r.rects)===JSON.stringify(edDrag.orig)) edUndoStack.pop(); // plain click, nothing changed
    else{pruneDoors(); levelTouched();}
    edDrag=null;
    return;
  }
  panRef=null;
}
function edNearestEdge(fi,fj){
  // tolerance in tiles, but never less than ~12 screen px — zoomed out, a
  // fixed tile fraction becomes an unclickably thin band
  const tol=Math.min(.5, Math.max(.35, 12/(ET*edCam.s)));
  const dv=Math.abs(fi-Math.round(fi)), dh=Math.abs(fj-Math.round(fj));
  if(Math.min(dv,dh)>tol) return null;
  return dv<=dh ? {x:Math.round(fi),y:Math.floor(fj),dir:"v"} : {x:Math.floor(fi),y:Math.round(fj),dir:"h"};
}
function edToggleDoor(fi,fj){
  const d=edNearestEdge(fi,fj);
  if(!d) return;
  edSnapshot();
  const i=DOORS.findIndex(o=>o.x===d.x&&o.y===d.y&&o.dir===d.dir);
  if(i<0) DOORS.push({...d,type:"door"});                   // none -> door
  else if(DOORS[i].type==="door") DOORS[i].type="open";     // door -> opening
  else DOORS.splice(i,1);                                   // opening -> none
  levelTouched();
}
function edRemoveDoor(fi,fj){
  const d=edNearestEdge(fi,fj);
  if(!d) return;
  const i=DOORS.findIndex(o=>o.x===d.x&&o.y===d.y&&o.dir===d.dir);
  if(i>=0){edSnapshot(); DOORS.splice(i,1); levelTouched();}
}
function edProp(fi,fj,removeOnly){
  const x=Math.floor(fi), y=Math.floor(fj);
  const i=LEVEL.props.findIndex(p=>p.x===x&&p.y===y);
  if(i>=0){edSnapshot(); LEVEL.props.splice(i,1); levelTouched(); return;}
  if(removeOnly) return;
  edSnapshot();
  LEVEL.props.push({t:edPropType,x,y});
  levelTouched();
}
function edSetTool(t){
  edTool=t; edDraft=null; edDrag=null; edHover=null;

function loadImageURL(url,name){
  const img=new Image();
  img.onload=()=>{
    state.map.img=img; state.map.imgURL=url; state.map.name=name||"map";
    const f=document.createElement("canvas");

    fc.fillStyle="#04130C"; fc.fillRect(0,0,f.width,f.height);
    state.map.fog=f;
    if(state.map.tokens.length===0){
      const g=state.map.grid.size;
      LEVEL.roster.filter(p=>p.pc).slice(0,6).forEach((p,i)=>{
        state.map.tokens.push(mkTok(p.name,p.letter,p.color,g*(1.5+i),g*1.5,1,true));
      });
    }
    setScene("map"); markDirty();
  };
  img.src=url;
}

/* ---------------- save / load ---------------- */
function serialize(){
  return {
    v:1, scene:state.scene,
    map:{
      name:state.map.name, imgURL:state.map.imgURL,
      grid:state.map.grid, fogOn:state.map.fogOn, brush:state.map.brush,
      tokens:state.map.tokens,
      fogURL: state.map.fog ? state.map.fog.toDataURL("image/png") : null
    },
    verso:{revealed:state.verso.revealed, tokens:state.verso.tokens},
    level:levelData()
  };
}
function deserialize(d){
  try{
    if(d.level && Array.isArray(d.level.rooms)) loadLevel(d.level);
    state.verso.revealed=d.verso.revealed||{white:true};
    state.verso.tokens=(d.verso.tokens||[]).map(t=>({...t}));
    uid=Math.max(uid,...state.verso.tokens.map(t=>t.id+1),1);
    Object.assign(state.map.grid,d.map.grid||{});
    state.map.fogOn=d.map.fogOn!==false;
    state.map.brush=d.map.brush||90;
    state.map.tokens=(d.map.tokens||[]).map(t=>({...t}));
    uid=Math.max(uid,...state.map.tokens.map(t=>t.id+1),uid);
    // saves from before the PC/claimable flag existed have no `pc` on any token —
    // without a backfill that makes every character look like an NPC to the newer
    // claim-list and room-visibility logic, silently hiding the party from itself.
    // Only trust this for files where NO token has the field yet (a real legacy
    // file), so a deliberately-all-NPC scene loaded from a current save is untouched.
    for(const toks of [state.verso.tokens, state.map.tokens]){
      if(toks.length && toks.every(t=>t.pc===undefined)){
        const pcNames=new Set([...LEVEL.roster,...PARTY].filter(p=>p.pc).map(p=>p.name));
        for(const t of toks) if(pcNames.has(t.name)) t.pc=true;
      }
    }
    if(d.map.imgURL){
      const img=new Image();
      img.onload=()=>{
        state.map.img=img; state.map.imgURL=d.map.imgURL; state.map.name=d.map.name;
        const f=document.createElement("canvas");
        f.width=img.width;f.height=img.height;
        const fc=f.getContext("2d");
        if(d.map.fogURL){
          const fi=new Image();
          fi.onload=()=>{fc.drawImage(fi,0,0);};
          fi.src=d.map.fogURL;
        }else{fc.fillStyle="#04130C";fc.fillRect(0,0,f.width,f.height);}
        state.map.fog=f;
        if(d.scene) setScene(d.scene);
      };
      img.src=d.map.imgURL;
    }else if(d.scene){ setScene(d.scene); }
    renderPanel();
  }catch(err){console.error("load failed",err);}
}
$("btn-save").onclick=()=>{
  const blob=new Blob([JSON.stringify(serialize())],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="palimpsest-session.json";
  a.click(); URL.revokeObjectURL(a.href);
};

$("file-json").onchange=e=>{

  const rd=new FileReader();
  rd.onload=()=>{try{deserialize(JSON.parse(rd.result));}catch(err){alert("That file didn't parse as a saved session.");}};
  rd.readAsText(f); e.target.value="";
};

/* autosave to claude.ai artifact storage when available */
let dirty=false;
function markDirty(){dirty=true; netMark();}
async function autosave(){
  if(NET.mode==="client") return;
  if(!dirty) return; dirty=false;
  try{
    if(typeof window.storage!=="undefined" && window.storage && window.storage.set){
      const d=serialize();
      const s=JSON.stringify(d);
      if(s.length>4500000){ d.map.imgURL=null; d.map.fogURL=null; }
      await window.storage.set("verso-session",JSON.stringify(d));
    }
  }catch(e){/* storage unavailable — file save still works */}
}
setInterval(autosave,8000);
(async function tryRestore(){
  if(new URLSearchParams(location.search).has("join")) return;
  try{
    if(typeof window.storage!=="undefined" && window.storage && window.storage.get){
      const r=await window.storage.get("verso-session");
      if(r && r.value) deserialize(JSON.parse(r.value));
    }
  }catch(e){/* nothing stored yet */}
})();

/* one-click rolls from a token's sheet — same UI for players (their claim)
   and the DM (any selected token, e.g. rolling for NPCs) */
function tokenRoll(t,o){ // o: {die,mod,expr,label,init}
  // o.label is omitted for freeform custom rolls — the dice notation (e.g. "8d6")
  // already says what was rolled, so echoing it a second time is just noise
  const label=o.label ? t.name+" · "+o.label : t.name;
  if(NET.mode==="client"){clientSend({type:"roll",die:o.die,mod:o.mod,expr:o.expr,label,init:o.init});return;}
  if(o.expr){const pd=parseDice(o.expr); if(pd) roll(pd.d,pd.n,pd.mod,"dm",label); return;}
  const e=roll(o.die,1,o.mod||0,"dm",label);
  if(o.init) trackerSet(t.name,e.total,t.id,false);
}
function adjustHP(t,delta){
  const sh=t.sheet; if(!sh) return;
  const max=sh.hpMax;
  let cur = sh.hp==null ? (max==null?0:max) : sh.hp;
  cur = Math.max(0, max==null ? cur+delta : Math.min(max,cur+delta));
  sh.hp=cur;
  if(NET.mode==="client") clientSend({type:"sheet",id:t.id,sheet:sh});   // host re-validates & re-syncs
  else markDirty();
  renderPanel();
}

    const chk=/^(\w{3}) check$/.exec(k);

function wireSheetRolls(p,t){
  // all lookups scoped to the container: the same ids can exist transiently
  // in both the panel and the pop-out float during re-renders
  const sh=t.sheet, q=sel=>p.querySelector(sel);
  if(!sh || !q("#sr-roll")) return;
  const skillPick=()=>{
    const k=q("#sr-skill").value;
    const chk=/^(\w{3}) check$/.exec(k);
    return {k, bonus: chk ? (sh.abil[chk[1].toLowerCase()]||0) : skillBonus(sh,k)};
  };
  p.querySelectorAll("[data-hpd]").forEach(el=>{el.onclick=()=>adjustHP(t,+el.dataset.hpd);});
  const si=q("#sr-init"); if(si) si.onclick=()=>tokenRoll(t,{die:20,mod:initOf(sh),label:"Initiative",init:true});
  const ssa=q("#sr-spellatk"); if(ssa) ssa.onclick=()=>tokenRoll(t,{die:20,mod:spellAtkBonus(sh),label:"Spell Attack"});
  const scg=q("#sr-customgo");
  if(scg){
    const goCustom=()=>{
      const expr=q("#sr-custom").value.trim();
      const pd=parseDice(expr);
      const inp=q("#sr-custom");
      if(!pd){inp.style.borderColor="var(--oxblood)";setTimeout(()=>{if(inp)inp.style.borderColor="";},900);return;}
      tokenRoll(t,{expr});
    };
    scg.onclick=goCustom;
    q("#sr-custom").addEventListener("keydown",e=>{if(e.key==="Enter")goCustom();});
  }
  p.querySelectorAll("[data-srhit]").forEach(el=>{el.onclick=()=>{const a=sh.atks[+el.dataset.srhit];if(a)tokenRoll(t,{die:20,mod:a.hit,label:a.name});};});
  p.querySelectorAll("[data-sradv]").forEach(el=>{el.onclick=()=>{const a=sh.atks[+el.dataset.sradv];if(a)tokenRoll(t,{die:"adv",mod:a.hit,label:a.name+" (adv)"});};});
  p.querySelectorAll("[data-srdis]").forEach(el=>{el.onclick=()=>{const a=sh.atks[+el.dataset.srdis];if(a)tokenRoll(t,{die:"dis",mod:a.hit,label:a.name+" (dis)"});};});
  p.querySelectorAll("[data-srdmg]").forEach(el=>{el.onclick=()=>{const a=sh.atks[+el.dataset.srdmg];if(a)tokenRoll(t,{expr:a.dmg,label:a.name+" damage"});};});
  q("#sr-roll").onclick=()=>{const s=skillPick();tokenRoll(t,{die:20,mod:s.bonus,label:s.k});};
  q("#sr-adv").onclick=()=>{const s=skillPick();tokenRoll(t,{die:"adv",mod:s.bonus,label:s.k+" (adv)"});};
  q("#sr-dis").onclick=()=>{const s=skillPick();tokenRoll(t,{die:"dis",mod:s.bonus,label:s.k+" (dis)"});};
}

/* pop-out roll palette: same controls, floating over the map, draggable by its header */
let rollsFloatOpen=false;
function rollsFloatToken(){
  return NET.mode==="client" ? S().tokens.find(t=>t.id===NET.myToken)
                             : S().tokens.find(t=>t.id===state.selToken);
}
function renderRollsFloat(){
  const el=$("rolls-float");
  if(!el) return;
  const t=(rollsFloatOpen && state.mode!=="edit") ? rollsFloatToken() : null;
  if(!t || !t.sheet){el.style.display="none";el.innerHTML="";return;}
  const ae=document.activeElement;
  // only bail for an open select/input — a just-clicked button shouldn't freeze the display
  if(ae && el.contains(ae) && (ae.tagName==="SELECT"||ae.tagName==="INPUT"||ae.tagName==="TEXTAREA")) return;
  el.style.display="block";
  el.innerHTML=`<div class="rfh" id="rf-head">🎲 ${esc(t.name).toUpperCase()}<span class="x" id="rf-close" title="dock back into the panel">✕</span></div>`
    +sheetRollsHTML(t);
  wireSheetRolls(el,t);
  $("rf-close").onclick=()=>{rollsFloatOpen=false;renderPanel();};
  const head=$("rf-head");
  head.onpointerdown=e=>{
    if(e.target.id==="rf-close") return;
    const r=el.getBoundingClientRect();
    const ox=e.clientX-r.left, oy=e.clientY-r.top;
    const move=ev=>{el.style.left=(ev.clientX-ox)+"px";el.style.top=(ev.clientY-oy)+"px";el.style.right="auto";el.style.bottom="auto";};
    const up=()=>{removeEventListener("pointermove",move);removeEventListener("pointerup",up);};
    addEventListener("pointermove",move); addEventListener("pointerup",up);
    e.preventDefault();
  };
}

function readSheetForm(){
  const num=id=>(+$(id).value||0)|0;
  const abil={}; for(const k of ["str","dex","con","int","wis","cha"]) abil[k]=num("sh-"+k);
  const atks=$("sh-atks").value.split("\n").map(s=>s.trim()).filter(Boolean).map(line=>{
    const m=/^(.+?)\s+([+-]?\d+)\s+(\S+)$/.exec(line);
    return m?{name:m[1],hit:+m[2],dmg:m[3]}:null;
  }).filter(Boolean);
  const skills={};
  $("sh-skills").value.split("\n").map(s=>s.trim()).filter(Boolean).forEach(line=>{
    const m=/^(.+?)\s+([+-]?\d+)$/.exec(line);
    if(m) skills[m[1]]=+m[2];
  });
  const raw=id=>{const v=$(id).value.trim();return v===""?null:+v;};
  return sanitizeSheet({prof:num("sh-prof"),init:raw("sh-init"),
    ac:raw("sh-ac"),hp:raw("sh-hp"),hpMax:raw("sh-hpmax"),
    spellAbil:$("sh-spellabil").value||null,abil,atks,skills});
}
