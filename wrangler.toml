# Cloudflare Workers config — deploys src/worker.js and serves ./public behind it.
# run_worker_first is required: without it Cloudflare serves the static files
# directly and the Basic Auth check in the worker never runs.
name = "vtt"
main = "src/worker.js"
compatibility_date = "2025-06-01"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
